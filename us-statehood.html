<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Growth of a Nation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #141110;
  --parchment: #e8dcc8;
  --parchment-dim: #c4b89e;
  --gold: #c9a84c;
  --gold-bright: #e8c55a;
  --border: rgba(201,168,76,0.2);
}

html, body { 
  height: 100%; 
  overflow: hidden;
  background: var(--bg);
  color: var(--parchment);
  font-family: 'Crimson Pro', serif;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 12px 20px 10px;
}

header {
  text-align: center;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: clamp(18px, 3vw, 28px);
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
}

header .subtitle {
  font-size: clamp(10px, 1.5vw, 13px);
  color: var(--parchment-dim);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 2px;
  font-weight: 300;
}

#map-area {
  flex: 1;
  position: relative;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#map-area svg {
  width: 100%;
  height: 100%;
}

.state-path {
  fill: rgba(255,255,255,0.03);
  stroke: rgba(255,255,255,0.08);
  stroke-width: 0.5;
  transition: fill 0.8s ease, stroke 0.5s ease;
  cursor: pointer;
}

.state-path.admitted {
  stroke: rgba(255,255,255,0.25);
  stroke-width: 0.7;
}

.state-path.current-highlight {
  stroke: var(--gold-bright);
  stroke-width: 2;
  filter: drop-shadow(0 0 6px rgba(201,168,76,0.5));
}

.state-path:hover {
  stroke: var(--gold);
  stroke-width: 1.5;
  filter: brightness(1.2);
}

.state-label {
  font-family: 'Crimson Pro', serif;
  font-size: 8px;
  fill: rgba(255,255,255,0.7);
  text-anchor: middle;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
  font-weight: 600;
}

.state-label.visible {
  opacity: 1;
}

/* Info panel */
#info-panel {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(20,17,16,0.92);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 18px;
  min-width: 200px;
  max-width: 260px;
  backdrop-filter: blur(10px);
  transition: opacity 0.4s ease;
}

#info-panel.empty { opacity: 0.4; }

#info-panel .state-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

#info-panel .order-num {
  font-size: 36px;
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  color: var(--gold-bright);
  opacity: 0.25;
  position: absolute;
  top: 8px;
  right: 14px;
  line-height: 1;
}

#info-panel .date {
  font-size: 14px;
  color: var(--parchment-dim);
  margin-top: 4px;
  font-style: italic;
}

#info-panel .era-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  color: var(--parchment-dim);
}

#info-panel .era-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

/* Controls */
#controls {
  flex-shrink: 0;
  padding: 10px 0 4px;
  border-top: 1px solid var(--border);
}

#timeline-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

#play-btn {
  background: none;
  border: 1px solid var(--gold);
  color: var(--gold);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
  flex-shrink: 0;
}

#play-btn:hover {
  background: var(--gold);
  color: var(--bg);
}

#slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: rgba(201,168,76,0.2);
  border-radius: 2px;
  outline: none;
}

#slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 6px rgba(201,168,76,0.4);
}

#slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  border: 2px solid var(--bg);
}

#step-label {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  color: var(--gold);
  min-width: 50px;
  text-align: right;
  flex-shrink: 0;
}

#speed-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.speed-controls {
  display: flex;
  gap: 6px;
  align-items: center;
}

.speed-controls span {
  font-size: 11px;
  color: var(--parchment-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.speed-btn {
  background: none;
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--parchment-dim);
  padding: 2px 10px;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Crimson Pro', serif;
  font-size: 12px;
  transition: all 0.2s;
}

.speed-btn:hover, .speed-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.1);
}

/* Legend */
#legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

#legend .leg-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--parchment-dim);
  letter-spacing: 0.5px;
}

#legend .leg-swatch {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* Year marker */
#year-display {
  position: absolute;
  bottom: 10px;
  left: 12px;
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 900;
  color: var(--gold);
  opacity: 0.12;
  line-height: 1;
  pointer-events: none;
}

#counter-display {
  position: absolute;
  bottom: 10px;
  left: 12px;
  font-family: 'Playfair Display', serif;
  font-size: clamp(14px, 2vw, 18px);
  color: var(--parchment-dim);
  opacity: 0.6;
  pointer-events: none;
}

/* Loading */
#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  background: var(--bg);
  z-index: 100;
}

#loading .spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loading p {
  color: var(--parchment-dim);
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Error */
#error-msg {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: var(--bg);
  z-index: 100;
  text-align: center;
  padding: 40px;
}

#error-msg h2 {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
}

#error-msg p { color: var(--parchment-dim); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>The Growth of a Nation</h1>
    <div class="subtitle">Statehood 1787 &ndash; 1959</div>
  </header>
  
  <div id="map-area">
    <div id="loading">
      <div class="spinner"></div>
      <p>Drawing the republic...</p>
    </div>
    <div id="error-msg">
      <h2>Map data unavailable</h2>
      <p>Could not load geographic boundaries. Please check your connection and reload.</p>
    </div>
    <svg id="map-svg"></svg>
    <div id="info-panel" class="empty">
      <div class="order-num" id="info-order">&mdash;</div>
      <div class="state-name" id="info-name">Select a state</div>
      <div class="date" id="info-date">or press play</div>
      <div class="era-label" id="info-era"></div>
    </div>
    <div id="year-display"></div>
  </div>

  <div id="controls">
    <div id="timeline-row">
      <button id="play-btn" aria-label="Play">&#9654;</button>
      <input type="range" id="slider" min="0" max="50" value="0">
      <span id="step-label">0 / 50</span>
    </div>
    <div id="speed-row">
      <div id="legend"></div>
      <div class="speed-controls">
        <span>Speed</span>
        <button class="speed-btn" data-speed="2000">Slow</button>
        <button class="speed-btn active" data-speed="1000">Med</button>
        <button class="speed-btn" data-speed="400">Fast</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// ── State admission data keyed by FIPS code ──
const STATES = {
  "10": { name:"Delaware",        abbr:"DE", order:1,  date:"December 7, 1787" },
  "42": { name:"Pennsylvania",    abbr:"PA", order:2,  date:"December 12, 1787" },
  "34": { name:"New Jersey",      abbr:"NJ", order:3,  date:"December 18, 1787" },
  "13": { name:"Georgia",         abbr:"GA", order:4,  date:"January 2, 1788" },
  "09": { name:"Connecticut",     abbr:"CT", order:5,  date:"January 9, 1788" },
  "25": { name:"Massachusetts",   abbr:"MA", order:6,  date:"February 6, 1788" },
  "24": { name:"Maryland",        abbr:"MD", order:7,  date:"April 28, 1788" },
  "45": { name:"South Carolina",  abbr:"SC", order:8,  date:"May 23, 1788" },
  "33": { name:"New Hampshire",   abbr:"NH", order:9,  date:"June 21, 1788" },
  "51": { name:"Virginia",        abbr:"VA", order:10, date:"June 25, 1788" },
  "36": { name:"New York",        abbr:"NY", order:11, date:"July 26, 1788" },
  "37": { name:"North Carolina",  abbr:"NC", order:12, date:"November 21, 1789" },
  "44": { name:"Rhode Island",    abbr:"RI", order:13, date:"May 29, 1790" },
  "50": { name:"Vermont",         abbr:"VT", order:14, date:"March 4, 1791" },
  "21": { name:"Kentucky",        abbr:"KY", order:15, date:"June 1, 1792" },
  "47": { name:"Tennessee",       abbr:"TN", order:16, date:"June 1, 1796" },
  "39": { name:"Ohio",            abbr:"OH", order:17, date:"March 1, 1803" },
  "22": { name:"Louisiana",       abbr:"LA", order:18, date:"April 30, 1812" },
  "18": { name:"Indiana",         abbr:"IN", order:19, date:"December 11, 1816" },
  "28": { name:"Mississippi",     abbr:"MS", order:20, date:"December 10, 1817" },
  "17": { name:"Illinois",        abbr:"IL", order:21, date:"December 3, 1818" },
  "01": { name:"Alabama",         abbr:"AL", order:22, date:"December 14, 1819" },
  "23": { name:"Maine",           abbr:"ME", order:23, date:"March 15, 1820" },
  "29": { name:"Missouri",        abbr:"MO", order:24, date:"August 10, 1821" },
  "05": { name:"Arkansas",        abbr:"AR", order:25, date:"June 15, 1836" },
  "26": { name:"Michigan",        abbr:"MI", order:26, date:"January 26, 1837" },
  "12": { name:"Florida",         abbr:"FL", order:27, date:"March 3, 1845" },
  "48": { name:"Texas",           abbr:"TX", order:28, date:"December 29, 1845" },
  "19": { name:"Iowa",            abbr:"IA", order:29, date:"December 28, 1846" },
  "55": { name:"Wisconsin",       abbr:"WI", order:30, date:"May 29, 1848" },
  "06": { name:"California",      abbr:"CA", order:31, date:"September 9, 1850" },
  "27": { name:"Minnesota",       abbr:"MN", order:32, date:"May 11, 1858" },
  "41": { name:"Oregon",          abbr:"OR", order:33, date:"February 14, 1859" },
  "20": { name:"Kansas",          abbr:"KS", order:34, date:"January 29, 1861" },
  "54": { name:"West Virginia",   abbr:"WV", order:35, date:"June 20, 1863" },
  "32": { name:"Nevada",          abbr:"NV", order:36, date:"October 31, 1864" },
  "31": { name:"Nebraska",        abbr:"NE", order:37, date:"March 1, 1867" },
  "08": { name:"Colorado",        abbr:"CO", order:38, date:"August 1, 1876" },
  "38": { name:"North Dakota",    abbr:"ND", order:39, date:"November 2, 1889" },
  "46": { name:"South Dakota",    abbr:"SD", order:40, date:"November 2, 1889" },
  "30": { name:"Montana",         abbr:"MT", order:41, date:"November 8, 1889" },
  "53": { name:"Washington",      abbr:"WA", order:42, date:"November 11, 1889" },
  "16": { name:"Idaho",           abbr:"ID", order:43, date:"July 3, 1890" },
  "56": { name:"Wyoming",         abbr:"WY", order:44, date:"July 10, 1890" },
  "49": { name:"Utah",            abbr:"UT", order:45, date:"January 4, 1896" },
  "40": { name:"Oklahoma",        abbr:"OK", order:46, date:"November 16, 1907" },
  "35": { name:"New Mexico",      abbr:"NM", order:47, date:"January 6, 1912" },
  "04": { name:"Arizona",         abbr:"AZ", order:48, date:"February 14, 1912" },
  "02": { name:"Alaska",          abbr:"AK", order:49, date:"January 3, 1959" },
  "15": { name:"Hawaii",          abbr:"HI", order:50, date:"August 21, 1959" }
};

// ── Eras for color coding ──
const ERAS = [
  { name:"Original Thirteen",      range:[1,13],  color:"#8B3A3A" },
  { name:"Early Republic",         range:[14,17], color:"#2E6B5A" },
  { name:"Expansion Era",          range:[18,28], color:"#B8860B" },
  { name:"Pre-Civil War",          range:[29,34], color:"#6B5B3E" },
  { name:"Civil War & Gilded Age", range:[35,38], color:"#4A6A8A" },
  { name:"Western Settlement",     range:[39,45], color:"#8B6B3E" },
  { name:"Early 20th Century",     range:[46,48], color:"#7A5C6A" },
  { name:"Modern Additions",       range:[49,50], color:"#5B7A6A" }
];

function getEra(order) {
  return ERAS.find(e => order >= e.range[0] && order <= e.range[1]);
}

function getColor(order) {
  const era = getEra(order);
  return era ? era.color : '#555';
}

// Sorted state list by admission order
const statesByOrder = Object.entries(STATES)
  .map(([fips, s]) => ({ fips, ...s }))
  .sort((a,b) => a.order - b.order);

// ── State label offsets for small/overlapping states ──
const LABEL_OFFSETS = {
  "DE": [12, 0], "CT": [14, 0], "RI": [16, 0], 
  "NJ": [12, 0], "MD": [0, 12], "MA": [16, 0],
  "NH": [14, 0], "VT": [0, -4], "DC": [10, 10],
  "HI": [0, 0], "AK": [0, 0]
};

// ── App state ──
let currentStep = 0;
let playing = false;
let interval = null;
let speed = 1000;
let hoveredState = null;
let geoData = null;
let statePaths = {};

// ── DOM refs ──
const svg = d3.select('#map-svg');
const slider = document.getElementById('slider');
const stepLabel = document.getElementById('step-label');
const playBtn = document.getElementById('play-btn');
const yearDisplay = document.getElementById('year-display');

// ── Build legend ──
const legendEl = document.getElementById('legend');
ERAS.forEach(e => {
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.innerHTML = `<div class="leg-swatch" style="background:${e.color}"></div>${e.name}`;
  legendEl.appendChild(item);
});

// ── Load map data ──
const DATA_URLS = [
  'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json',
  'https://unpkg.com/us-atlas@3/states-10m.json'
];

async function loadData() {
  let data = null;
  for (const url of DATA_URLS) {
    try {
      const resp = await fetch(url);
      if (resp.ok) { data = await resp.json(); break; }
    } catch(e) { continue; }
  }
  if (!data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
    return;
  }
  geoData = topojson.feature(data, data.objects.states);
  buildMap();
  document.getElementById('loading').style.display = 'none';
}

function buildMap() {
  const container = document.getElementById('map-area');
  const w = container.clientWidth;
  const h = container.clientHeight;

  svg.attr('viewBox', `0 0 ${w} ${h}`);

  const projection = d3.geoAlbersUsa()
    .fitSize([w - 20, h - 20], geoData)
    .translate([w/2, h/2]);

  const path = d3.geoPath().projection(projection);

  // Draw states
  const stateGroup = svg.append('g').attr('class', 'states');

  stateGroup.selectAll('path')
    .data(geoData.features)
    .enter()
    .append('path')
    .attr('d', path)
    .attr('class', 'state-path')
    .attr('data-fips', d => d.id)
    .on('mouseenter', function(event, d) {
      const info = STATES[d.id];
      if (info && info.order <= currentStep) {
        hoveredState = d.id;
        updateInfoPanel(d.id);
      }
    })
    .on('mouseleave', function() {
      hoveredState = null;
      updateInfoPanel(null);
    })
    .each(function(d) {
      statePaths[d.id] = this;
    });

  // Add state labels
  const labelGroup = svg.append('g').attr('class','labels');
  
  geoData.features.forEach(feat => {
    const info = STATES[feat.id];
    if (!info) return;
    const centroid = path.centroid(feat);
    if (isNaN(centroid[0])) return;
    const off = LABEL_OFFSETS[info.abbr] || [0, 0];
    labelGroup.append('text')
      .attr('class', 'state-label')
      .attr('id', `label-${feat.id}`)
      .attr('x', centroid[0] + off[0])
      .attr('y', centroid[1] + off[1] + 3)
      .text(info.abbr);
  });

  updateMap();
}

function updateMap() {
  // Update each state's appearance
  Object.entries(STATES).forEach(([fips, info]) => {
    const el = statePaths[fips];
    if (!el) return;
    const pathEl = d3.select(el);
    const label = d3.select(`#label-${fips}`);

    if (info.order <= currentStep) {
      pathEl.classed('admitted', true);
      pathEl.style('fill', getColor(info.order));
      label.classed('visible', true);

      if (info.order === currentStep) {
        pathEl.classed('current-highlight', true);
      } else {
        pathEl.classed('current-highlight', false);
      }
    } else {
      pathEl.classed('admitted', false).classed('current-highlight', false);
      pathEl.style('fill', 'rgba(255,255,255,0.03)');
      label.classed('visible', false);
    }
  });

  // Update year display
  if (currentStep > 0) {
    const st = statesByOrder[currentStep - 1];
    const year = st.date.split(', ').pop();
    yearDisplay.textContent = year;
  } else {
    yearDisplay.textContent = '';
  }

  // Update info panel for current highlighted state
  if (!hoveredState) {
    if (currentStep > 0) {
      const current = statesByOrder[currentStep - 1];
      updateInfoPanel(current.fips);
    } else {
      updateInfoPanel(null);
    }
  }

  // Update slider & label
  slider.value = currentStep;
  stepLabel.textContent = `${currentStep} / 50`;
}

function updateInfoPanel(fips) {
  const panel = document.getElementById('info-panel');
  const nameEl = document.getElementById('info-name');
  const dateEl = document.getElementById('info-date');
  const orderEl = document.getElementById('info-order');
  const eraEl = document.getElementById('info-era');

  if (!fips || !STATES[fips] || STATES[fips].order > currentStep) {
    panel.classList.add('empty');
    nameEl.textContent = currentStep === 0 ? 'Press play to begin' : 'Hover over a state';
    dateEl.textContent = currentStep === 0 ? 'or drag the timeline' : '';
    orderEl.textContent = '';
    eraEl.innerHTML = '';
    return;
  }

  const info = STATES[fips];
  const era = getEra(info.order);
  panel.classList.remove('empty');
  nameEl.textContent = info.name;
  dateEl.textContent = info.date;
  orderEl.textContent = `#${info.order}`;
  eraEl.innerHTML = `<span class="era-dot" style="background:${era.color}"></span>${era.name}`;
}

// ── Controls ──
playBtn.addEventListener('click', () => {
  if (playing) {
    stopPlaying();
  } else {
    startPlaying();
  }
});

function startPlaying() {
  if (currentStep >= 50) currentStep = 0;
  playing = true;
  playBtn.innerHTML = '&#9646;&#9646;';
  advance();
}

function stopPlaying() {
  playing = false;
  playBtn.innerHTML = '&#9654;';
  clearTimeout(interval);
}

function advance() {
  if (!playing) return;
  if (currentStep >= 50) {
    stopPlaying();
    return;
  }
  currentStep++;
  updateMap();
  interval = setTimeout(advance, speed);
}

slider.addEventListener('input', () => {
  currentStep = parseInt(slider.value);
  if (playing) stopPlaying();
  updateMap();
});

// Speed controls
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    speed = parseInt(btn.dataset.speed);
  });
});

// ── Resize handling ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!geoData) return;
    svg.selectAll('*').remove();
    statePaths = {};
    buildMap();
  }, 250);
});

// ── Initialize ──
loadData();
</script>
