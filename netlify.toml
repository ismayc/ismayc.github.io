[build]
  command = "echo 'skipping build'"
  publish = "docs"
  # GitHub Actions (.github/workflows/quarto-netlify.yaml) renders the site and
  # deploys it to production via the Netlify CLI. So we skip Netlify's own
  # git-triggered builds here (exit 0 = ignore/cancel the build). The CLI deploy
  # uses `--dir` and bypasses this ignore command, so production still updates.
  ignore = "exit 0"

[build.environment]
  PYTHON_VERSION = "3.12"
  PIP_INSTALL = "false"
  # Firebase web apiKey is public by design (client-side config, access is
  # governed by Firebase Security Rules), so allow this known value past the
  # secrets scanner instead of failing the deploy.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDGcu91SmpVLAPOwzQqb9k1Z5515WoAlOk"