<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>When Can We Meet? — Friday, April 17</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1c25;
    --surface-hover: #22252f;
    --border: #2a2d3a;
    --text: #e8e6e3;
    --text-dim: #8b8a8d;
    --accent: #7c6aef;
    --accent-glow: rgba(124, 106, 239, 0.15);
    --accent-light: #a599f5;
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.12);
    --green-border: rgba(52, 211, 153, 0.3);
    --amber: #fbbf24;
    --amber-bg: rgba(251, 191, 36, 0.1);
    --red: #f87171;
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  .page {
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header .eyebrow {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(1.75rem, 5vw, 2.5rem);
    color: var(--text);
    margin-bottom: 0.35rem;
  }

  header .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.4rem 1rem;
    border-radius: 100px;
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-top: 0.75rem;
  }

  header .date-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }

  .step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.5rem; height: 1.5rem;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  .name-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .name-btn {
    position: relative;
    padding: 0.55rem 1.2rem;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .name-btn:hover:not(.taken):not(.selected) {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .name-btn.selected {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  .name-btn.taken {
    border-color: var(--green-border);
    background: var(--green-bg);
    color: var(--green);
    cursor: default;
    opacity: 0.7;
  }

  .name-btn.taken::after { content: ' \2713'; }

  .time-grid {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 0;
  }

  .time-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    padding: 0.5rem 0.75rem 0.5rem 0;
    text-align: right;
    border-bottom: 1px solid transparent;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.5rem;
  }

  .tz-mst { color: var(--text); font-weight: 500; }
  .tz-cdt { color: var(--text-dim); font-size: 0.72rem; opacity: 0.7; }

  .tz-header {
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
    padding: 0.3rem 0.75rem 0.5rem 0;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  .time-slot {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-bottom: none;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.85rem;
    color: var(--text-dim);
    user-select: none;
    min-height: 2.5rem;
    display: flex;
    align-items: center;
  }

  .time-slot:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
  .time-slot:last-of-type  { border-bottom: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); }

  .time-slot:hover:not(.locked) {
    background: var(--accent-glow);
    border-color: var(--accent);
  }

  .time-slot.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .time-slot.locked { cursor: default; }

  .time-slot .avatars { display: flex; gap: 0.35rem; flex-wrap: wrap; }

  .avatar-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.15rem 0.55rem;
    border-radius: 100px;
    font-size: 0.72rem;
    font-weight: 600;
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .avatar-chip.other {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
  }

  .submit-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.65rem 1.5rem;
    border-radius: 100px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; filter: none; transform: none; }

  .results-table { width: 100%; border-collapse: collapse; }

  .results-table th {
    text-align: left;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .results-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }

  .results-table tr:last-child td { border-bottom: none; }

  .count-bar { display: flex; align-items: center; gap: 0.5rem; }
  .count-fill { height: 6px; border-radius: 3px; transition: width 0.4s ease; }

  .best-badge {
    display: inline-block;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    color: var(--green);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.15rem 0.5rem;
    border-radius: 100px;
    margin-left: 0.4rem;
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,17,23,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 1rem;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay span { font-size: 0.85rem; color: var(--text-dim); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--green);
    color: #0f1117;
    font-weight: 600;
    font-size: 0.88rem;
    padding: 0.65rem 1.5rem;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .empty-state svg { display: block; margin: 0 auto 0.75rem; opacity: 0.3; }

  @media (max-width: 500px) {
    .page { padding: 1.25rem 0.75rem 3rem; }
    .card { padding: 1.15rem; }
    .time-grid { grid-template-columns: 130px 1fr; }
    .time-label { font-size: 0.7rem; gap: 0.3rem; }
    .tz-cdt { font-size: 0.65rem; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card { animation: fadeUp 0.5s ease both; }
  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.16s; }
  .card:nth-child(4) { animation-delay: 0.24s; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
  <span>Loading availability...</span>
</div>

<div class="page">
  <header>
    <div class="eyebrow">Group Scheduling</div>
    <h1>When Can We Meet?</h1>
    <div class="date-badge">
      <span class="dot"></span>
      Friday, April 17, 2026
    </div>
  </header>

  <div class="card">
    <div class="card-title"><span class="step-number">1</span> Who are you?</div>
    <div class="name-grid" id="nameGrid"></div>
  </div>

  <div class="card" id="timeCard" style="opacity:0.4; pointer-events:none;">
    <div class="card-title"><span class="step-number">2</span> Tap your available times</div>
    <p id="tzSubtitle" style="font-size:0.82rem;color:var(--text-dim);margin:-0.5rem 0 1rem;">Times shown in your local timezone</p>
    <div class="time-grid" id="timeGrid"></div>
    <div class="submit-row">
      <button class="btn btn-primary" id="submitBtn" disabled onclick="submitAvailability()">Submit My Times</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Group Availability</div>
    <div id="resultsBody">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        No responses yet. Pick your name above to get started.
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // =====================================================
  //  PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW
  //  See SETUP.md for step-by-step instructions.
  // =====================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw3KOFrRU_jcVCZXz_f733igxl1Yy8jFfzp0DBLXOmXKlu3cOd4v3KMBExsnrNhcJg/exec';

  const NAMES = ['Phil', 'Andy', 'Ryan', 'Jake', 'Chester'];
  const SLOTS = [];

  // ---- Timezone detection ----
  const LOCAL_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const CDT_TZ   = 'America/Chicago';
  const probe    = new Date(Date.UTC(2026, 3, 17, 17, 0));
  const fmtOpts  = { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: '' };

  function fmtInTz(date, tz) {
    return new Intl.DateTimeFormat('en-US', { ...fmtOpts, timeZone: tz }).format(date);
  }

  function tzAbbr(tz) {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, timeZoneName: 'short'
    }).formatToParts(probe);
    const p = parts.find(p => p.type === 'timeZoneName');
    return p ? p.value : tz;
  }

  const localAbbr      = tzAbbr(LOCAL_TZ);
  const cdtAbbr        = tzAbbr(CDT_TZ);
  const viewerIsCentral = localAbbr === cdtAbbr;
  const showDualTz     = !viewerIsCentral;

  // ---- Generate 30-min slots ----
  // 1 PM MST (UTC-7) = 20:00 UTC on Apr 17 2026, through 8 PM MST
  const BASE_UTC_HOUR = 20;
  const SLOT_COUNT    = 14;

  for (let i = 0; i < SLOT_COUNT; i++) {
    const s = new Date(Date.UTC(2026, 3, 17, BASE_UTC_HOUR, i * 30));
    const e = new Date(Date.UTC(2026, 3, 17, BASE_UTC_HOUR, (i + 1) * 30));
    SLOTS.push({
      id:         `slot-${i}`,
      localLabel: fmtInTz(s, LOCAL_TZ),
      localRange: `${fmtInTz(s, LOCAL_TZ)} - ${fmtInTz(e, LOCAL_TZ)}`,
      cdtLabel:   fmtInTz(s, CDT_TZ),
      cdtRange:   `${fmtInTz(s, CDT_TZ)} - ${fmtInTz(e, CDT_TZ)}`
    });
  }

  // ---- State ----
  let data = {};
  let currentName = null;
  let selectedSlots = new Set();
  let submitted = false;

  // =========================================================
  //  Google Sheets read / write via Apps Script web app
  // =========================================================
  function setLoading(on) {
    document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
  }

  async function loadFromSheet() {
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      showToast('Paste your Apps Script URL into index.html first.');
      return;
    }
    setLoading(true);
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      data = await res.json();
    } catch (err) {
      console.error('Load failed:', err);
      showToast('Could not reach the Google Sheet.');
    }
    setLoading(false);
  }

  async function saveToSheet(name, slots) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',                       // Apps Script redirects; no-cors avoids CORS issues
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ name, slots })
      });
      // Short pause to let the write propagate, then refresh
      await new Promise(r => setTimeout(r, 1500));
      await loadFromSheet();
    } catch (err) {
      console.error('Save failed:', err);
      showToast('Save failed. Try again in a moment.');
    }
  }

  // ---- Render helpers ----
  function renderAll() {
    renderNames();
    renderTimeGrid();
    updateSubmitBtn();
    renderResults();
  }

  function renderNames() {
    const grid = document.getElementById('nameGrid');
    grid.innerHTML = '';
    NAMES.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'name-btn';
      btn.textContent = name;
      if (data[name]) btn.classList.add('taken');
      if (name === currentName) {
        btn.classList.remove('taken');
        btn.classList.add('selected');
      }
      btn.onclick = () => selectName(name);
      grid.appendChild(btn);
    });
  }

  async function selectName(name) {
    if (submitted && name !== currentName) return;
    if (data[name] && name !== currentName) return;

    // Pull fresh data so we see everyone else's submissions
    await loadFromSheet();

    if (data[name] && name !== currentName) {
      renderAll();
      showToast(`${name} has already submitted.`);
      return;
    }

    currentName = name;
    selectedSlots = new Set(data[name] || []);
    submitted = !!data[name];
    renderAll();
    enableTimeCard(true);
  }

  function renderTimeGrid() {
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = '';

    if (showDualTz) {
      const hdr = document.createElement('div');
      hdr.className = 'tz-header';
      hdr.innerHTML = `<span>${localAbbr}</span><span style="opacity:0.5">${cdtAbbr}</span>`;
      grid.appendChild(hdr);
      const spacer = document.createElement('div');
      spacer.style.cssText = 'padding:0.3rem 0 0.5rem;';
      grid.appendChild(spacer);
    }

    SLOTS.forEach(slot => {
      const lbl = document.createElement('div');
      lbl.className = 'time-label';
      lbl.innerHTML = showDualTz
        ? `<span class="tz-mst">${slot.localLabel}</span><span class="tz-cdt">${slot.cdtLabel}</span>`
        : `<span class="tz-mst">${slot.localLabel}</span>`;
      grid.appendChild(lbl);

      const cell = document.createElement('div');
      cell.className = 'time-slot';
      if (submitted) cell.classList.add('locked');

      const others = NAMES.filter(n => n !== currentName && data[n] && data[n].includes(slot.id));
      if (selectedSlots.has(slot.id)) cell.classList.add('active');

      const chips = [];
      if (selectedSlots.has(slot.id)) chips.push('<span class="avatar-chip">You</span>');
      others.forEach(n => chips.push(`<span class="avatar-chip other">${n}</span>`));
      if (chips.length) cell.innerHTML = `<div class="avatars">${chips.join('')}</div>`;

      if (!submitted) cell.onclick = () => toggleSlot(slot.id);
      grid.appendChild(cell);
    });
  }

  function toggleSlot(id) {
    if (!currentName || submitted) return;
    selectedSlots.has(id) ? selectedSlots.delete(id) : selectedSlots.add(id);
    renderTimeGrid();
    updateSubmitBtn();
  }

  function enableTimeCard(on) {
    const c = document.getElementById('timeCard');
    c.style.opacity = on ? '1' : '0.4';
    c.style.pointerEvents = on ? 'auto' : 'none';
  }

  function updateSubmitBtn() {
    const btn = document.getElementById('submitBtn');
    if (submitted) { btn.textContent = 'Submitted'; btn.disabled = true; }
    else { btn.textContent = `Submit My Times (${selectedSlots.size})`; btn.disabled = selectedSlots.size === 0; }
  }

  async function submitAvailability() {
    if (!currentName || selectedSlots.size === 0) return;
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Saving\u2026';
    btn.disabled = true;

    data[currentName] = Array.from(selectedSlots);
    await saveToSheet(currentName, data[currentName]);

    submitted = true;
    renderAll();
    showToast('Saved to the sheet! Others will see your times automatically.');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function renderResults() {
    const body = document.getElementById('resultsBody');
    const respondents = NAMES.filter(n => data[n]);

    if (respondents.length === 0) {
      body.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
          No responses yet. Pick your name above to get started.
        </div>`;
      return;
    }

    const slotCounts = {};
    SLOTS.forEach(s => { slotCounts[s.id] = []; });
    respondents.forEach(name => {
      (data[name] || []).forEach(sid => { if (slotCounts[sid]) slotCounts[sid].push(name); });
    });

    const active = SLOTS.filter(s => slotCounts[s.id].length > 0)
                        .sort((a, b) => slotCounts[b.id].length - slotCounts[a.id].length);
    const maxCount  = respondents.length;
    const bestCount = active.length > 0 ? slotCounts[active[0].id].length : 0;

    let html = `<p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:1rem;">
      ${respondents.length} of 5 have responded: ${respondents.join(', ')}</p>`;

    const cdtHdr = showDualTz ? `<th>${cdtAbbr}</th>` : '';
    html += `<table class="results-table"><thead><tr>
      <th>${showDualTz ? localAbbr : 'Time (' + localAbbr + ')'}</th>${cdtHdr}<th>Available</th><th>Who</th>
    </tr></thead><tbody>`;

    active.forEach(slot => {
      const names = slotCounts[slot.id];
      const pct   = (names.length / maxCount) * 100;
      const color = names.length === maxCount ? 'var(--green)'
                  : names.length >= maxCount * 0.6 ? 'var(--amber)' : 'var(--accent)';
      const isBest = names.length === bestCount && bestCount > 1;
      const cdtCol = showDualTz
        ? `<td style="white-space:nowrap;color:var(--text-dim);font-size:0.82rem">${slot.cdtRange}</td>` : '';

      html += `<tr>
        <td style="white-space:nowrap">${slot.localRange}${isBest ? '<span class="best-badge">Best</span>' : ''}</td>
        ${cdtCol}
        <td><div class="count-bar">
          <div class="count-fill" style="width:${pct}%;background:${color};min-width:8px;"></div>
          <span style="font-size:0.8rem;font-weight:600;">${names.length}/${maxCount}</span>
        </div></td>
        <td style="font-size:0.82rem;color:var(--text-dim)">${names.join(', ')}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    body.innerHTML = html;
  }

  // ---- Boot ----
  document.getElementById('tzSubtitle').textContent = showDualTz
    ? `Times shown in ${localAbbr} with ${cdtAbbr} equivalents`
    : `Times shown in ${localAbbr}`;

  (async () => {
    await loadFromSheet();
    renderAll();
  })();
</script>
</body>
</html>
