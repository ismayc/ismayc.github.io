<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequence - Play the Blind 4th Variant</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,600;0,700;1,400&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090e;--bg2:#0e1019;--surface:#13151f;--surface2:#191c2a;--border:#1e2235;--border2:#2a2e42;
  --text:#cdd1de;--text2:#8b90a5;--text3:#565a6e;--green:#22c55e;--blue:#3b82f6;--red:#ef4444;--yellow:#eab308;--gold2:#ca8a04;--gold-bg:rgba(234,179,8,.06);--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(170deg,var(--bg),var(--bg2) 40%,#0c1425 100%);
  font-family:'Outfit',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;padding:10px 8px;user-select:none}
@keyframes chipSlam{0%{transform:scale(0) rotate(-30deg);opacity:0}40%{transform:scale(1.8) rotate(5deg);opacity:1}60%{transform:scale(.85) rotate(-2deg)}75%{transform:scale(1.15) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
@keyframes ripple{0%{box-shadow:0 0 0 0 var(--ripple-color);transform:scale(1)}50%{box-shadow:0 0 0 12px transparent;transform:scale(1.05)}100%{box-shadow:0 0 0 0 transparent;transform:scale(1)}}
@keyframes cellFlash{0%{background:var(--flash-color)}100%{background:#fff}}
@keyframes beacon{0%{box-shadow:0 0 0 0 var(--beacon-color)}40%{box-shadow:0 0 0 18px transparent}100%{box-shadow:0 0 0 0 transparent}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(34,197,94,.4)}50%{box-shadow:0 0 18px rgba(34,197,94,.8)}}
@keyframes yellowGlow{0%,100%{box-shadow:0 0 6px rgba(234,179,8,.3)}50%{box-shadow:0 0 18px rgba(234,179,8,.7)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes validPulse{0%,100%{box-shadow:0 0 10px rgba(34,197,94,.3);border-color:rgba(34,197,94,.6)}50%{box-shadow:0 0 24px rgba(34,197,94,.8);border-color:rgba(34,197,94,1)}}
@keyframes validYPulse{0%,100%{box-shadow:0 0 10px rgba(234,179,8,.3);border-color:rgba(234,179,8,.6)}50%{box-shadow:0 0 24px rgba(234,179,8,.8);border-color:rgba(234,179,8,1)}}
@keyframes removePulse{0%,100%{box-shadow:0 0 10px rgba(249,115,22,.3);border-color:rgba(249,115,22,.6)}50%{box-shadow:0 0 24px rgba(249,115,22,.8);border-color:rgba(249,115,22,1)}}

h1{font-family:'Crimson Pro',serif;font-size:28px;font-weight:600;font-style:italic;
  background:linear-gradient(135deg,#fde68a,#eab308,#ca8a04);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
#setup{max-width:420px;margin:40px auto;animation:fadeIn .5s ease}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.setup-card h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.diff-btn{padding:8px 16px;border:2px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text2);font-family:'Outfit';font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
.diff-btn:hover{border-color:var(--text2)}.diff-btn.sel{border-color:var(--yellow);color:var(--yellow);background:var(--gold-bg)}
.start-btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Outfit';font-weight:700;font-size:16px;cursor:pointer;background:linear-gradient(135deg,var(--gold2),var(--yellow));color:#1a1a2e;transition:all .15s}
.start-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
#game{display:none;width:100%;max-width:1000px}
#status-bar{text-align:center;padding:8px 16px;margin-bottom:8px;border-radius:10px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--border);min-height:38px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s}
#status-bar.your-turn{border-color:var(--green);background:rgba(34,197,94,.08);animation:glow 2s infinite}
#status-bar.yellow-turn{border-color:var(--yellow);background:var(--gold-bg);animation:yellowGlow 2s infinite}
#round-info{display:flex;gap:12px;justify-content:center;margin-bottom:8px;font-size:11px;color:var(--text3);flex-wrap:wrap}
#round-info span{background:var(--surface);padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
.game-layout{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.side-panel{width:180px;flex-shrink:0}
.opp-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;transition:all .3s}
.opp-box.active{animation:fadeIn .3s ease}.opp-name{font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px}
.opp-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.opp-cards{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-top:4px}
.opp-diff{font-size:9px;color:var(--text3);margin-top:2px}
.yellow-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
#board-wrap{background:rgba(0,0,0,.3);border-radius:12px;padding:6px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.5);flex:1;min-width:380px;max-width:500px}
#board{display:grid;grid-template-columns:repeat(10,1fr);gap:2.5px}
.cell{width:100%;aspect-ratio:1;min-width:0;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:all .12s;cursor:default;border:1px solid #d1d5db;background:#fff}
.cell.free{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#d97706}
.cell.valid{cursor:pointer;border:3px solid var(--green);animation:validPulse 1s ease infinite;z-index:5;transform:scale(1.06);background:rgba(34,197,94,.06)}
.cell.valid:hover{transform:scale(1.15);z-index:10;box-shadow:0 0 20px rgba(34,197,94,.7)}
.cell.valid-yellow{cursor:pointer;border:3px solid var(--yellow);animation:validYPulse 1s ease infinite;z-index:5;transform:scale(1.06);background:rgba(234,179,8,.06)}
.cell.valid-yellow:hover{transform:scale(1.15);z-index:10;box-shadow:0 0 20px rgba(234,179,8,.7)}
.cell.valid-wild{cursor:pointer;border:3px solid var(--green);box-shadow:0 0 10px rgba(34,197,94,.3);background:rgba(34,197,94,.04);z-index:3}
.cell.valid-wild:hover{transform:scale(1.12);z-index:10;box-shadow:0 0 18px rgba(34,197,94,.6)}
.cell.valid-remove{cursor:pointer;border:3px solid var(--orange);animation:removePulse 1s ease infinite;z-index:5;transform:scale(1.06);background:rgba(249,115,22,.08)}
.cell.valid-remove:hover{transform:scale(1.15);z-index:10;box-shadow:0 0 20px rgba(249,115,22,.7)}
.lm-green{--ripple-color:rgba(34,197,94,.5);--flash-color:rgba(34,197,94,.25);--beacon-color:rgba(34,197,94,.5);animation:ripple .7s ease,cellFlash 1.2s ease;border:2.5px solid var(--green)!important;z-index:20;transform:scale(1.08)}
.lm-blue{--ripple-color:rgba(59,130,246,.5);--flash-color:rgba(59,130,246,.25);--beacon-color:rgba(59,130,246,.5);animation:ripple .7s ease,cellFlash 1.2s ease;border:2.5px solid var(--blue)!important;z-index:20;transform:scale(1.08)}
.lm-red{--ripple-color:rgba(239,68,68,.5);--flash-color:rgba(239,68,68,.25);--beacon-color:rgba(239,68,68,.5);animation:ripple .7s ease,cellFlash 1.2s ease;border:2.5px solid var(--red)!important;z-index:20;transform:scale(1.08)}
.lm-yellow{--ripple-color:rgba(234,179,8,.5);--flash-color:rgba(234,179,8,.25);--beacon-color:rgba(234,179,8,.5);animation:ripple .7s ease,cellFlash 1.2s ease;border:2.5px solid var(--yellow)!important;z-index:20;transform:scale(1.08)}
.chip{width:13px;height:13px;border-radius:50%;margin-top:1px}.chip.new-chip{animation:chipSlam .6s cubic-bezier(.17,.67,.35,1.2) both}
.corner-chip{width:12px;height:12px;border-radius:50%;margin-top:1px;background:radial-gradient(circle at 38% 35%,#fcd34d,#b45309);border:2px solid #d97706}
.lock-icon{position:absolute;top:1px;right:2px;font-size:6px;line-height:1;opacity:.7}
.cell .beacon{position:absolute;inset:-4px;border-radius:8px;pointer-events:none;animation:beacon .9s ease both}
.card-lbl{font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
#hand-area{margin-top:10px;text-align:center}#hand-label{font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px}
#hand{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.hand-card{background:#fff;border:2px solid #d1d5db;border-radius:6px;padding:6px 8px;cursor:pointer;transition:all .15s;min-width:40px;text-align:center}
.hand-card:hover{transform:translateY(-4px);border-color:var(--green)}
.hand-card.selected{transform:translateY(-6px);box-shadow:0 4px 12px rgba(34,197,94,.3)}
.hand-card.sel-normal{border-color:var(--green);background:#f0fdf4}
.hand-card.sel-wild{border-color:var(--green);background:#f0fdf4}
.hand-card.sel-remove{border-color:var(--orange);background:#fff7ed}
.hand-card.dead{opacity:.4;border-color:#666;cursor:not-allowed}
#yellow-prompt{display:none;margin-top:10px;padding:10px 16px;border-radius:10px;text-align:center;background:var(--gold-bg);border:1px solid var(--yellow);font-size:12px;color:var(--yellow);font-weight:600}
#log{background:rgba(0,0,0,.3);border-radius:10px;border:1px solid var(--border);padding:8px;max-height:120px;overflow-y:auto;width:100%;max-width:500px;margin-top:8px}
.log-line{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#overlay-box{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:32px 40px;text-align:center;animation:fadeIn .5s ease;max-width:400px}
#overlay-box h2{font-family:'Crimson Pro',serif;font-size:32px;font-weight:600;font-style:italic;margin-bottom:8px}
#overlay-box p{color:var(--text2);font-size:14px;margin-bottom:20px}
#overlay-box button{padding:10px 24px;border:none;border-radius:8px;font-family:'Outfit';font-weight:700;font-size:14px;cursor:pointer;background:linear-gradient(135deg,var(--gold2),var(--yellow));color:#1a1a2e}
</style>
</head>
<body>
<div style="text-align:center;margin-bottom:8px"><h1>♠ SEQUENCE ♦</h1><div class="subtitle" id="subtitle">Blind 4th Variant &middot; Play Against 2 AIs</div></div>
<div id="setup">
  <div class="setup-card"><h3><span class="opp-dot" style="background:var(--green)"></span> You are Green</h3><p style="font-size:12px;color:var(--text3)">You'll play first each round.</p></div>
  <div class="setup-card"><h3><span class="opp-dot" style="background:var(--blue)"></span> Blue (CPU)</h3><div style="display:flex;gap:6px" id="blue-diff"><button class="diff-btn" onclick="setDiff('blue',1,this)">Novice</button><button class="diff-btn sel" onclick="setDiff('blue',2,this)">Middling</button><button class="diff-btn" onclick="setDiff('blue',3,this)">Optimal</button></div></div>
  <div class="setup-card"><h3><span class="opp-dot" style="background:var(--red)"></span> Red (CPU)</h3><div style="display:flex;gap:6px" id="red-diff"><button class="diff-btn" onclick="setDiff('red',1,this)">Novice</button><button class="diff-btn sel" onclick="setDiff('red',2,this)">Middling</button><button class="diff-btn" onclick="setDiff('red',3,this)">Optimal</button></div></div>
  <div class="setup-card"><h3>🃏 Jacks</h3><p style="font-size:11px;color:var(--text3);margin-bottom:8px">Two-eyed (♦♣) = wild placement. One-eyed (♠♥) = remove opponent chip.</p><div style="display:flex;gap:6px" id="jack-toggle"><button class="diff-btn" onclick="setJacks(false,this)">No Jacks</button><button class="diff-btn sel" onclick="setJacks(true,this)">With Jacks</button></div></div>
  <button class="start-btn" onclick="startGame()">Start Game</button>
</div>
<div id="game">
  <div id="status-bar">Setting up...</div><div id="round-info"></div>
  <div class="game-layout">
    <div class="side-panel">
      <div class="opp-box" id="blue-box"><div class="opp-name"><span class="opp-dot" style="background:var(--blue)"></span> Blue</div><div class="opp-diff" id="blue-diff-label"></div><div class="opp-cards" id="blue-cards"></div></div>
      <div class="opp-box" id="red-box"><div class="opp-name"><span class="opp-dot" style="background:var(--red)"></span> Red</div><div class="opp-diff" id="red-diff-label"></div><div class="opp-cards" id="red-cards"></div></div>
      <div class="yellow-box" id="yellow-box"><div class="opp-name"><span class="opp-dot" style="background:var(--yellow)"></span> Yellow</div><div style="font-size:10px;color:var(--text3);margin-top:2px">Blind 4th</div></div>
    </div>
    <div id="board-wrap"><div id="board"></div></div>
  </div>
  <div id="hand-area"><div id="hand-label">Your Hand (Green)</div><div id="hand"></div></div>
  <div id="yellow-prompt"></div>
  <div id="game-legend" style="display:flex;gap:8px;margin-top:8px;font-size:9px;color:#94a3b8;flex-wrap:wrap;justify-content:center"></div>
  <div id="log"></div>
</div>
<div id="overlay"><div id="overlay-box"></div></div>
<script>
const BD=[["FREE","2S","3S","4S","5S","6S","7S","8S","9S","FREE"],["6C","5C","4C","3C","2C","AH","KH","QH","10H","10S"],["7C","AS","2D","3D","4D","5D","6D","7D","9H","QS"],["8C","KS","6C","5C","4C","3C","2C","8D","8H","KS"],["9C","QS","7C","6H","5H","4H","AH","9D","7H","AS"],["10C","10S","8C","7H","2H","3H","KH","10D","6H","2D"],["QC","9S","9C","8H","9H","10H","QH","QD","5H","3D"],["KC","8S","10C","QC","KC","AC","AD","KD","4H","4D"],["AC","7S","6S","5S","4S","3S","2S","2H","3H","5D"],["FREE","AD","KD","QD","10D","9D","8D","7D","6D","FREE"]];
const SU=["S","D","C","H"],SY={S:"♠",D:"♦",C:"♣",H:"♥"},SC={S:"#1e293b",D:"#dc2626",C:"#1e293b",H:"#dc2626"};
const RK=["2","3","4","5","6","7","8","9","10","Q","K","A"];
const PC=["#22c55e","#3b82f6","#ef4444","#eab308"],PN=["Green (You)","Blue","Red","Yellow"];
const CB=["radial-gradient(circle at 38% 35%,#4ade80,#15803d)","radial-gradient(circle at 38% 35%,#60a5fa,#1d4ed8)","radial-gradient(circle at 38% 35%,#f87171,#b91c1c)","radial-gradient(circle at 38% 35%,#fde68a,#a16207)"];
const DR=[[0,1],[1,0],[1,1],[1,-1]],DL=["","Novice","Middling","Optimal"],LMC=['green','blue','red','yellow'];
let G,blueDiff=2,redDiff=2,useJacks=true,selCard=null,selType='n',vSpots=[],yMode=false,yCard=null,ySpots=[],over=false,lm=null,lmp=-1;
const cR=c=>c.replace(/[SDCH]/g,""),cS=c=>c[c.length-1],TEJ=c=>c==="JD"||c==="JC",OEJ=c=>c==="JS"||c==="JH",isJ=c=>TEJ(c)||OEJ(c);
const cL=(c,s)=>{if(!c||c==="FREE")return`<span style="font-size:${s||9}px;font-weight:700;color:#d97706">★</span>`;return`<span class="card-lbl" style="font-size:${s||9}px;color:${SC[cS(c)]}">${cR(c)}<span style="font-size:${(s||9)-1}px">${SY[cS(c)]}</span></span>`};
const cT=c=>cR(c)+SY[cS(c)];
function setDiff(w,l,b){if(w==='blue')blueDiff=l;else redDiff=l;b.parentElement.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')}
function setJacks(v,b){useJacks=v;b.parentElement.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')}
function startGame(){document.getElementById('setup').style.display='none';document.getElementById('game').style.display='block';
  document.getElementById('blue-diff-label').textContent=DL[blueDiff];document.getElementById('red-diff-label').textContent=DL[redDiff];
  document.getElementById('subtitle').textContent=`Blind 4th · ${useJacks?'With Jacks':'No Jacks'} · Play Against 2 AIs`;
  let lg='<span>★ Free corner</span><span>🔒 Completed sequence</span><span style="color:#eab308">● Yellow = blind 4th</span>';
  if(useJacks)lg+='<span style="color:var(--green)">J♦/J♣ = Wild</span><span style="color:var(--orange)">J♠/J♥ = Remove chip</span>';
  else lg+='<span>No Jacks</span>';document.getElementById('game-legend').innerHTML=lg;initGame()}
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function initGame(){const dc=[];for(const s of SU){for(const r of RK)dc.push(r+s);if(useJacks)dc.push('J'+s)}
  const dk=shuf([...dc,...dc]);G={chips:Array.from({length:10},()=>Array(10).fill(0)),locked:Array.from({length:10},()=>Array(10).fill(false)),deck:dk,hands:[[],[],[]],round:0,log:[]};
  for(const[r,c]of[[0,0],[0,9],[9,0],[9,9]])G.chips[r][c]=9;for(let p=0;p<3;p++)G.hands[p]=G.deck.splice(0,7);
  over=false;lm=null;lmp=-1;selCard=null;selType='n';vSpots=[];yMode=false;
  addLog(`Game started! ${useJacks?'Jacks are in play.':'No Jacks.'}`,'var(--green)');render();nextRound()}
// Helpers
function gSpots(card){if(TEJ(card)){const p=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(G.chips[r][c]===0)p.push([r,c]);return p}
  if(OEJ(card)){const p=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(G.chips[r][c]>0&&G.chips[r][c]<9&&!G.locked[r][c])p.push([r,c]);return p}
  const p=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(BD[r][c]===card&&G.chips[r][c]===0)p.push([r,c]);return p}
function gSpotsP(card,pl){if(OEJ(card))return gSpots(card).filter(([r,c])=>G.chips[r][c]!==pl);return gSpots(card)}
function isDd(card){if(isJ(card))return false;for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(BD[r][c]===card&&G.chips[r][c]===0)return false;return true}
function draw(){return G.deck.length?G.deck.shift():null}
function runAt(r,c,ch,pl){let b=0;for(const d of DR){let run=1;for(const sn of[1,-1])for(let st=1;st<=4;st++){const rr=r+d[0]*st*sn,cc=c+d[1]*st*sn;if(rr<0||rr>=10||cc<0||cc>=10)break;if(ch[rr][cc]===pl||ch[rr][cc]===9)run++;else break}b=Math.max(b,run)}return b}
function mOT(r,c,ch,pl){let b=0;for(let o=1;o<=3;o++){if(o===pl)continue;b=Math.max(b,runAt(r,c,ch,o))}return b}
function pL(r,c,ch,pl){let cnt=0;for(const d of DR){for(let st=-4;st<=0;st++){let fr=0,bl=false;for(let s=0;s<5;s++){const rr=r+d[0]*(st+s),cc=c+d[1]*(st+s);if(rr<0||rr>=10||cc<0||cc>=10){bl=true;break}const v=ch[rr][cc];if(v===pl||v===9||v===0){if(v===pl||v===9)fr++}else{bl=true;break}}if(!bl&&fr>=1){cnt++;break}}}return cnt}
function fLock(pl){const sq=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++)for(const d of DR){const cells=[];for(let s=0;s<5;s++){const rr=r+d[0]*s,cc=c+d[1]*s;if(rr<0||rr>=10||cc<0||cc>=10)break;if(G.chips[rr][cc]===pl||G.chips[rr][cc]===9)cells.push([rr,cc]);else break}if(cells.length>=5)sq.push(cells)}let f=false;for(const s of sq){f=true;for(const[r,c]of s)G.locked[r][c]=true}return f}
// AI
function aiMove(hand,pl,diff){for(let ci=0;ci<hand.length;ci++){if(isDd(hand[ci])){const nc=draw();if(nc)hand[ci]=nc;else hand.splice(ci,1);return{action:'dead'}}}
  if(diff===1){const ps=[];for(let ci=0;ci<hand.length;ci++){const sp=gSpotsP(hand[ci],pl);if(sp.length)ps.push({ci,card:hand[ci],spots:sp})}if(!ps.length)return null;const pk=ps[Math.floor(Math.random()*ps.length)];return{ci:pk.ci,pos:pk.spots[Math.floor(Math.random()*pk.spots.length)],jk:OEJ(pk.card)?'r':TEJ(pk.card)?'w':null}}
  if(diff===2){for(let ci=0;ci<hand.length;ci++){const cd=hand[ci],sp=gSpotsP(cd,pl);if(!sp.length)continue;
    if(OEJ(cd)){let bt=-1,bp=sp[0];for(const[r,c]of sp){const t=runAt(r,c,G.chips,G.chips[r][c]);if(t>bt){bt=t;bp=[r,c]}}return{ci,pos:bp,jk:'r'}}
    let bs=-1,bp=sp[0];for(const[r,c]of sp){G.chips[r][c]=pl;const s=runAt(r,c,G.chips,pl);G.chips[r][c]=0;if(s>bs){bs=s;bp=[r,c]}}return{ci,pos:bp,jk:TEJ(cd)?'w':null}}return null}
  let bS=-Infinity,bM=null;for(let ci=0;ci<hand.length;ci++){const cd=hand[ci],sp=gSpotsP(cd,pl);if(!sp.length)continue;
    if(OEJ(cd)){for(const[r,c]of sp){const th=runAt(r,c,G.chips,G.chips[r][c]);let sc=th*20;if(th>=4)sc+=200;if(sc>bS){bS=sc;bM={ci,pos:[r,c],jk:'r'}}}continue}
    const jp=TEJ(cd)?15:0;for(const[r,c]of sp){G.chips[r][c]=pl;const own=runAt(r,c,G.chips,pl);const pot=pL(r,c,G.chips,pl);G.chips[r][c]=0;const def=mOT(r,c,G.chips,pl);
      let sc=own>=5?10000:own**3*5+pot*3+def**2*8-jp;if(own===4)sc+=150;if(def>=4)sc+=100;if(sc>bS){bS=sc;bM={ci,pos:[r,c],jk:TEJ(cd)?'w':null}}}}return bM}
function aiYellow(spots,ctrl){const diff=ctrl===0?3:[0,blueDiff,redDiff][ctrl];if(spots.length===1)return spots[0];if(ctrl===0)return null;
  let bI=0,bS=-Infinity;for(let i=0;i<spots.length;i++){const[r,c]=spots[i];G.chips[r][c]=4;const yr=runAt(r,c,G.chips,4);G.chips[r][c]=0;const ob=mOT(r,c,G.chips,ctrl);
    let sc=-yr*100+ob*10;if(yr>=5)sc-=10000;if(yr>=4)sc-=500;if(diff===1)sc=Math.random()*100;if(sc>bS){bS=sc;bI=i}}return spots[bI]}
function addLog(m,cl){G.log.push({m,cl:cl||'var(--text3)'});const el=document.getElementById('log');el.innerHTML+=`<div class="log-line" style="color:${cl||'var(--text3)'}">${m}</div>`;el.scrollTop=el.scrollHeight}
function setSt(m,cls){const el=document.getElementById('status-bar');el.textContent=m;el.className='';if(cls)el.classList.add(cls)}
// Flow
function nextRound(){if(over)return;G.round++;const ctrl=(G.round-1)%3;if(!G.deck.length){endDraw();return}
  const fl=draw();const cn=["You","Blue","Red"][ctrl];
  if(isJ(fl)){addLog(`Round ${G.round} | ${cn} flips ${cT(fl)} for Yellow (Jack, skip)`,PC[3]+'77');
    document.getElementById('round-info').innerHTML=`<span>Round ${G.round}</span><span style="color:var(--yellow)">Yellow flipped a Jack (skip)</span><span>Deck: ${G.deck.length}</span>`;
    afterY(ctrl);return}
  const sp=gSpots(fl);document.getElementById('round-info').innerHTML=`<span>Round ${G.round}</span><span style="color:var(--yellow)">Yellow by ${cn}</span><span>Deck: ${G.deck.length}</span>`;
  if(!sp.length){addLog(`Round ${G.round} | ${cn} flips ${cT(fl)} for Yellow (no spots)`,PC[3]+'99');afterY(ctrl);return}
  if(ctrl===0){yMode=true;yCard=fl;ySpots=sp;setSt(`You control Yellow! Flipped: ${cT(fl)}. Pick a spot.`,'yellow-turn');
    document.getElementById('yellow-prompt').style.display='block';document.getElementById('yellow-prompt').innerHTML=`Flipped: <span style="background:#fff;border:1px solid #d1d5db;border-radius:4px;padding:2px 6px">${cL(fl,12)}</span> — Click a yellow-highlighted cell.`;render();return}
  const pos=aiYellow(sp,ctrl);G.chips[pos[0]][pos[1]]=4;lm=pos;lmp=3;
  addLog(`Round ${G.round} | ${cn} flips ${cT(fl)} for Yellow → [${pos[0]+1},${pos[1]+1}]`,PC[3]+'cc');if(fLock(4)){showW(3);return}render();afterY(ctrl)}
function afterY(){yMode=false;ySpots=[];document.getElementById('yellow-prompt').style.display='none';hdDead(0);setSt("Your turn! Select a card, then click a board cell.",'your-turn');selCard=null;selType='n';vSpots=[];render()}
function hdDead(p){const h=G.hands[p];for(let ci=0;ci<h.length;ci++){if(isDd(h[ci])){const nc=draw();if(nc)h[ci]=nc;else h.splice(ci,1);if(p===0)addLog('You discard a dead card',PC[0]+'99');break}}}
function humanCard(ci){if(over||yMode)return;const cd=G.hands[0][ci];if(isDd(cd)){const nc=draw();if(nc)G.hands[0][ci]=nc;else G.hands[0].splice(ci,1);addLog(`Discard dead ${cT(cd)}`,PC[0]+'99');render();return}
  const sp=gSpotsP(cd,1);if(!sp.length){document.getElementById('status-bar').style.animation='shake .3s ease';setTimeout(()=>document.getElementById('status-bar').style.animation='',400);return}
  selCard=ci;selType=OEJ(cd)?'r':TEJ(cd)?'w':'n';vSpots=sp;
  if(selType==='r')setSt('One-eyed Jack! Click an opponent chip to remove.','your-turn');
  else if(selType==='w')setSt('Two-eyed Jack (wild)! Click any empty cell.','your-turn');render()}
function humanPlace(r,c){if(over)return;
  if(yMode){G.chips[r][c]=4;lm=[r,c];lmp=3;yMode=false;ySpots=[];document.getElementById('yellow-prompt').style.display='none';
    addLog(`Round ${G.round} | You flip ${cT(yCard)} for Yellow → [${r+1},${c+1}]`,PC[3]+'cc');if(fLock(4)){showW(3);return}render();afterY();return}
  if(selCard===null)return;const cd=G.hands[0][selCard];
  if(OEJ(cd)){const rm=G.chips[r][c];G.chips[r][c]=0;lm=[r,c];lmp=0;const nc=draw();if(nc)G.hands[0][selCard]=nc;else G.hands[0].splice(selCard,1);
    addLog(`Round ${G.round} | You play ${cT(cd)} to remove chip at [${r+1},${c+1}]`,PC[0]+'cc');
  }else{G.chips[r][c]=1;lm=[r,c];lmp=0;const nc=draw();if(nc)G.hands[0][selCard]=nc;else G.hands[0].splice(selCard,1);
    addLog(`Round ${G.round} | You play ${cT(cd)}${TEJ(cd)?' (wild)':''} → [${r+1},${c+1}]`,PC[0]+'cc');if(fLock(1)){selCard=null;vSpots=[];showW(0);return}}
  selCard=null;selType='n';vSpots=[];render();setTimeout(()=>cpuTurn(1),800)}
function cpuTurn(p){if(over)return;const nm=PN[p],diff=p===1?blueDiff:redDiff;setSt(`${nm} is thinking...`,'');
  const bx=document.getElementById(p===1?'blue-box':'red-box');bx.classList.add('active');bx.style.borderColor=PC[p];
  setTimeout(()=>{if(over)return;const mv=aiMove(G.hands[p],p+1,diff);bx.classList.remove('active');bx.style.borderColor='';
    if(mv&&mv.action==='dead'){addLog(`Round ${G.round} | ${nm} discards dead card`,PC[p]+'99');const mv2=aiMove(G.hands[p],p+1,diff);if(mv2&&!mv2.action)execCpu(mv2,p,nm)}
    else if(mv)execCpu(mv,p,nm);render();if(p===1)setTimeout(()=>cpuTurn(2),900);else setTimeout(()=>nextRound(),900)},500+Math.random()*500)}
function execCpu(mv,p,nm){const cd=G.hands[p][mv.ci];
  if(mv.jk==='r'){G.chips[mv.pos[0]][mv.pos[1]]=0;lm=mv.pos;lmp=p;const nc=draw();if(nc)G.hands[p][mv.ci]=nc;else G.hands[p].splice(mv.ci,1);
    addLog(`Round ${G.round} | ${nm} plays ${cT(cd)} to remove chip at [${mv.pos[0]+1},${mv.pos[1]+1}]`,PC[p]+'cc')}
  else{G.chips[mv.pos[0]][mv.pos[1]]=p+1;lm=mv.pos;lmp=p;const nc=draw();if(nc)G.hands[p][mv.ci]=nc;else G.hands[p].splice(mv.ci,1);
    addLog(`Round ${G.round} | ${nm} plays ${cT(cd)}${mv.jk==='w'?' (wild)':''} → [${mv.pos[0]+1},${mv.pos[1]+1}]`,PC[p]+'cc');if(fLock(p+1)){showW(p);return}}}
function endDraw(){over=true;setSt('Deck exhausted! Draw.','');document.getElementById('overlay').style.display='flex';
  document.getElementById('overlay-box').innerHTML='<h2 style="color:var(--text2)">Draw</h2><p>Deck ran out.</p><button onclick="location.reload()">Play Again</button>'}
function showW(p){over=true;render();document.getElementById('overlay').style.display='flex';
  if(p===3)document.getElementById('overlay-box').innerHTML='<h2 style="color:var(--yellow)">💀 Yellow Wins!</h2><p>Everyone loses!</p><button onclick="location.reload()">Play Again</button>';
  else if(p===0)document.getElementById('overlay-box').innerHTML='<h2 style="color:var(--green)">🏆 You Win!</h2><p>Congratulations!</p><button onclick="location.reload()">Play Again</button>';
  else document.getElementById('overlay-box').innerHTML=`<h2 style="color:${PC[p]}">${PN[p]} Wins</h2><p>CPU beat you.</p><button onclick="location.reload()">Play Again</button>`}
// Render
function render(){let bh='';for(let r=0;r<10;r++)for(let c=0;c<10;c++){const cell=BD[r][c],ch=G.chips[r][c],fr=cell==='FREE',lk=G.locked[r][c];
  const isL=lm&&lm[0]===r&&lm[1]===c&&!over;const vG=!yMode&&vSpots.some(([a,b])=>a===r&&b===c);const vY=yMode&&ySpots.some(([a,b])=>a===r&&b===c);
  let cls='cell';if(fr)cls+=' free';if(vY)cls+=' valid-yellow';else if(vG&&selType==='r')cls+=' valid-remove';else if(vG&&selType==='w')cls+=' valid-wild';else if(vG)cls+=' valid';
  if(isL&&lmp>=0)cls+=` lm-${LMC[lmp]}`;const oc=(vG||vY)?`onclick="humanPlace(${r},${c})"`:'';
  bh+=`<div class="${cls}" ${oc}>`;if(isL&&lmp>=0)bh+=`<div class="beacon" style="--beacon-color:${PC[lmp>3?3:lmp]}55"></div>`;
  bh+=cL(cell);const nw=isL;
  if(ch>0&&ch<9&&ch!==4){const ci=ch-1;bh+=`<div class="chip${nw?' new-chip':''}" style="background:${CB[ci]};border:2px solid ${PC[ci]};box-shadow:0 0 ${lk?12:4}px ${PC[ci]}${lk?'99':'44'}"></div>`}
  if(ch===4)bh+=`<div class="chip${nw?' new-chip':''}" style="background:${CB[3]};border:2px solid ${PC[3]};box-shadow:0 0 ${lk?14:5}px ${PC[3]}${lk?'99':'44'}"></div>`;
  if(ch===9)bh+=`<div class="corner-chip"></div>`;if(lk&&ch>0&&ch!==9){const ci=ch===4?3:ch-1;bh+=`<div class="lock-icon" style="color:${PC[ci]}">🔒</div>`}
  bh+=`</div>`}document.getElementById('board').innerHTML=bh;
  // Hand
  let hh='';const hand=G.hands[0];for(let ci=0;ci<hand.length;ci++){const cd=hand[ci],dd=isDd(cd),sel=selCard===ci,jk=isJ(cd);
    let cls='hand-card';if(dd)cls+=' dead';if(sel){cls+=' selected';cls+=selType==='r'?' sel-remove':selType==='w'?' sel-wild':' sel-normal'}
    hh+=`<div class="${cls}" onclick="humanCard(${ci})">${cL(cd,12)}${jk?`<div style="font-size:8px;color:var(--text3);margin-top:1px">${TEJ(cd)?'wild':'remove'}</div>`:''}</div>`}
  document.getElementById('hand').innerHTML=hh;document.getElementById('blue-cards').textContent=`${G.hands[1].length} cards`;document.getElementById('red-cards').textContent=`${G.hands[2].length} cards`;
  const yc=G.chips.flat().filter(v=>v===4).length;document.getElementById('yellow-box').querySelector('.opp-name').innerHTML=`<span class="opp-dot" style="background:var(--yellow)"></span> Yellow (${yc} chips)`}
</script>
</body>
