<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequence - Blind 4th Player Variant</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0a0f1a;--bg2:#111827;--gold:#eab308;--gold-dim:#a16207;
    --green:#22c55e;--blue:#3b82f6;--red:#ef4444;--yellow:#eab308;
    --surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);
    --text:#e2e8f0;--muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(170deg,var(--bg1),var(--bg2) 40%,#0c1425 100%);
    font-family:'Outfit',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;padding:10px 8px}

  @keyframes chipPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
  @keyframes pulseHL{0%,100%{box-shadow:0 0 4px rgba(250,204,21,.5)}50%{box-shadow:0 0 16px rgba(250,204,21,.9)}}
  @keyframes yellowGlow{0%,100%{box-shadow:0 0 6px rgba(234,179,8,.3)}50%{box-shadow:0 0 20px rgba(234,179,8,.7)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  h1{font-family:'Crimson Pro',serif;font-size:28px;font-weight:700;font-style:italic;
    background:linear-gradient(135deg,#fde68a,#eab308,#ca8a04);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:1px}
  .subtitle{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

  #round-banner{margin:8px 0;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;
    background:var(--surface);border:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
  .round-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

  #players{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
  .pbox{border-radius:10px;padding:5px 9px;min-width:120px;transition:all .25s ease;border:2px solid var(--border);background:var(--surface)}
  .pbox.active{animation:fadeIn .3s ease}
  .hand-cards{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
  .hcard{background:#fff;border:1px solid #d1d5db;border-radius:4px;padding:2px 4px}
  .hcard.hl{background:#fffbeb}
  .card-lbl{font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}

  #board-wrap{background:rgba(0,0,0,.3);border-radius:12px;padding:6px;
    border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.5);margin-bottom:8px;overflow-x:auto}
  #board{display:grid;grid-template-columns:repeat(10,1fr);gap:2.5px;min-width:380px}
  .cell{transition:transform .12s ease;cursor:default;width:100%;aspect-ratio:1;min-width:36px;
    border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .cell:hover{transform:scale(1.1);z-index:10}

  .chip{width:14px;height:14px;border-radius:50%;margin-top:1px}
  .corner-chip{width:13px;height:13px;border-radius:50%;margin-top:1px;
    background:radial-gradient(circle at 38% 35%,#fcd34d,#b45309);border:2px solid #d97706;box-shadow:0 0 4px rgba(251,191,36,.4)}
  .lock-icon{position:absolute;top:1px;right:2px;font-size:7px;line-height:1;opacity:.7}

  #controls{display:flex;gap:5px;margin-bottom:6px;align-items:center;flex-wrap:wrap;justify-content:center}
  .btn{cursor:pointer;border:none;border-radius:8px;font-family:'Outfit';font-weight:700;
    transition:all .12s ease;padding:7px 11px;font-size:12px;color:var(--text);background:#334155}
  .btn:hover{transform:translateY(-1px);filter:brightness(1.15)}
  .btn:active{transform:translateY(0)}

  #info{display:flex;gap:12px;align-items:center;margin-bottom:6px;font-size:11px;color:#94a3b8;flex-wrap:wrap;justify-content:center}
  #speed-slider{width:80px;accent-color:var(--gold)}
  #legend{display:flex;gap:8px;margin-bottom:6px;font-size:9px;color:#94a3b8;flex-wrap:wrap;justify-content:center}

  #log{background:rgba(0,0,0,.35);border-radius:10px;border:1px solid var(--border);
    padding:8px;max-height:130px;overflow-y:auto;width:100%;max-width:640px;margin-bottom:4px}
  .log-line{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}

  #winner-banner{margin-top:10px;padding:10px 22px;border-radius:12px;font-family:'Crimson Pro',serif;
    font-size:18px;font-weight:700;font-style:italic;text-align:center;display:none;animation:fadeIn .5s ease}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:4px">
  <h1>♠ SEQUENCE ♦</h1>
  <div class="subtitle">Blind 4th Player Variant &middot; No Jacks &middot; 1 Sequence to Win</div>
</div>

<div id="round-banner"></div>
<div id="players"></div>
<div id="board-wrap"><div id="board"></div></div>

<div id="controls">
  <button class="btn" onclick="goStart()">⏮</button>
  <button class="btn" id="btnBack" onclick="goBack()">◀</button>
  <button class="btn" id="btnPlay" onclick="togglePlay()" style="padding:7px 16px;font-size:13px">▶ Play</button>
  <button class="btn" id="btnNext" onclick="goNext()">▶</button>
  <button class="btn" onclick="goEnd()">⏭</button>
  <button class="btn" onclick="newGame()" style="background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff">🔄 New</button>
</div>

<div id="info">
  <span>Speed:</span>
  <input type="range" id="speed-slider" min="50" max="800" step="50" value="550" oninput="onSpeedChange(this.value)">
  <span id="turnInfo"></span>
  <span id="deckInfo"></span>
</div>

<div id="legend">
  <span>★ Free corner (wild for all)</span>
  <span>🔒 Completed sequence</span>
  <span style="color:#eab308">● Yellow = blind 4th (everyone loses)</span>
  <span>No Jacks in deck</span>
</div>

<div id="log"></div>
<div id="winner-banner"></div>

<script>
// ===== CONSTANTS =====
const BOARD=[
  ["FREE","2S","3S","4S","5S","6S","7S","8S","9S","FREE"],
  ["6C","5C","4C","3C","2C","AH","KH","QH","10H","10S"],
  ["7C","AS","2D","3D","4D","5D","6D","7D","9H","QS"],
  ["8C","KS","6C","5C","4C","3C","2C","8D","8H","KS"],
  ["9C","QS","7C","6H","5H","4H","AH","9D","7H","AS"],
  ["10C","10S","8C","7H","2H","3H","KH","10D","6H","2D"],
  ["QC","9S","9C","8H","9H","10H","QH","QD","5H","3D"],
  ["KC","8S","10C","QC","KC","AC","AD","KD","4H","4D"],
  ["AC","7S","6S","5S","4S","3S","2S","2H","3H","5D"],
  ["FREE","AD","KD","QD","10D","9D","8D","7D","6D","FREE"]];
const SUITS=["S","D","C","H"],SYM={S:"♠",D:"♦",C:"♣",H:"♥"},SCLR={S:"#1e293b",D:"#dc2626",C:"#1e293b",H:"#dc2626"};
const RANKS=["2","3","4","5","6","7","8","9","10","Q","K","A"];
// 4 players: 0=Green,1=Blue,2=Red,3=Yellow
const PC=["#22c55e","#3b82f6","#ef4444","#eab308"];
const PN=["Green","Blue","Red","Yellow"];
const PCB=[
  "radial-gradient(circle at 38% 35%,#4ade80,#15803d)",
  "radial-gradient(circle at 38% 35%,#60a5fa,#1d4ed8)",
  "radial-gradient(circle at 38% 35%,#f87171,#b91c1c)",
  "radial-gradient(circle at 38% 35%,#fde68a,#a16207)"];
const DIRS=[[0,1],[1,0],[1,1],[1,-1]];

function cRank(c){return c.replace(/[SDCH]/g,"")}
function cSuit(c){return c[c.length-1]}
function makeRng(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
function sShuffle(a,rng){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function runAt(r,c,chips,pl){let best=0;for(const d of DIRS){let run=1;for(const sign of[1,-1])for(let step=1;step<=4;step++){const rr=r+d[0]*step*sign,cc=c+d[1]*step*sign;if(rr<0||rr>=10||cc<0||cc>=10)break;const v=chips[rr][cc];if(v===pl||v===9)run++;else break}best=Math.max(best,run)}return best}
function maxOppThreat(r,c,chips,pl){let b=0;for(let o=1;o<=3;o++){if(o===pl)continue;b=Math.max(b,runAt(r,c,chips,o))}return b}
function potLines(r,c,chips,pl){let cnt=0;for(const d of DIRS){for(let st=-4;st<=0;st++){let fr=0,bl=false;for(let s=0;s<5;s++){const rr=r+d[0]*(st+s),cc=c+d[1]*(st+s);if(rr<0||rr>=10||cc<0||cc>=10){bl=true;break}const v=chips[rr][cc];if(v===pl||v===9||v===0){if(v===pl||v===9)fr++}else{bl=true;break}}if(!bl&&fr>=1){cnt++;break}}}return cnt}

// ===== GAME GENERATION =====
function generateGame(seed){
  const rng=makeRng(seed||Math.floor(Math.random()*2147483646)+1);
  const board=BOARD;
  // No Jacks deck
  const dc=[];for(const s of SUITS)for(const r of RANKS)dc.push(r+s);
  let deck=sShuffle([...dc,...dc],rng);
  const chips=Array.from({length:10},()=>Array(10).fill(0));
  for(const[r,c]of[[0,0],[0,9],[9,0],[9,9]])chips[r][c]=9;
  const locked=Array.from({length:10},()=>Array(10).fill(false));
  let disc=[];
  const hands=[[],[],[]];for(let p=0;p<3;p++)hands[p]=deck.splice(0,7);

  function getSpots(card){const pos=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(board[r][c]===card&&chips[r][c]===0)pos.push([r,c]);return pos}
  function isDead(card){for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(board[r][c]===card&&chips[r][c]===0)return false;return true}
  function draw(){if(!deck.length){if(!disc.length)return null;deck=sShuffle([...disc],rng);disc=[]}return deck.shift()}
  function findLock(pl){const sq=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++)for(const d of DIRS){const cells=[];for(let s=0;s<5;s++){const rr=r+d[0]*s,cc=c+d[1]*s;if(rr<0||rr>=10||cc<0||cc>=10)break;const v=chips[rr][cc];if(v===pl||v===9)cells.push([rr,cc]);else break}if(cells.length>=5)sq.push(cells)}for(const s of sq)for(const[r,c]of s)locked[r][c]=true;return sq.length>0}

  // Yellow placement: minimize Yellow run, then maximize opponent block
  function placeYellow(spots,ctrl){
    if(spots.length===1)return spots[0];
    let bestI=0,bestSc=-Infinity;
    for(let i=0;i<spots.length;i++){
      const[r,c]=spots[i];
      chips[r][c]=4;const yr=runAt(r,c,chips,4);chips[r][c]=0;
      const ob=maxOppThreat(r,c,chips,ctrl+1);
      let sc=-yr*100+ob*10;if(yr>=5)sc-=10000;if(yr>=4)sc-=500;
      if(sc>bestSc){bestSc=sc;bestI=i}}
    return spots[bestI]}

  // Real player best move
  function bestMove(hand,pl){
    let bestSc=-Infinity,bestM=null;
    for(let ci=0;ci<hand.length;ci++){
      const spots=getSpots(hand[ci]);if(!spots.length)continue;
      for(const[r,c]of spots){
        chips[r][c]=pl;const own=runAt(r,c,chips,pl);const pot=potLines(r,c,chips,pl);chips[r][c]=0;
        const def=maxOppThreat(r,c,chips,pl);
        let sc=own>=5?10000:own**3*5+pot*3+def**2*8;
        if(own===4)sc+=150;if(def>=4)sc+=100;
        if(sc>bestSc){bestSc=sc;bestM={ci,pos:[r,c]}}}}
    return bestM}

  const states=[],snap=()=>({chips:chips.map(r=>[...r]),locked:locked.map(r=>[...r]),hands:hands.map(h=>[...h]),deckSize:deck.length});
  states.push({...snap(),log:"Game begins! 7 cards dealt. No Jacks. Yellow is the blind 4th.",player:-1,card:null,pos:null,action:"start",winner:null,yellowWin:false,highlight:null,round:0,controller:-1,flipped:null});

  let turn=0,roundNum=0;
  outer:while(turn<800&&deck.length>0){
    roundNum++;
    const ctrl=(roundNum-1)%3; // 0,1,2 rotating

    // ---- YELLOW TURN ----
    turn++;if(turn>800||!deck.length)break;
    const flipped=deck.shift();
    const ySpots=getSpots(flipped);
    let yPos=null;
    if(ySpots.length>0){
      yPos=placeYellow(ySpots,ctrl);
      chips[yPos[0]][yPos[1]]=4;
      const yWon=findLock(4);
      states.push({...snap(),log:`Round ${roundNum} | ${PN[ctrl]} controls Yellow: flips ${flipped} → [${yPos[0]+1},${yPos[1]+1}]`,
        player:3,card:flipped,pos:yPos,action:"yellow",winner:yWon?3:null,yellowWin:yWon,highlight:yPos,round:roundNum,controller:ctrl,flipped});
      if(yWon)break outer;
    } else {
      states.push({...snap(),log:`Round ${roundNum} | ${PN[ctrl]} controls Yellow: flips ${flipped} (no open spots, skip)`,
        player:3,card:flipped,pos:null,action:"yellow-skip",winner:null,yellowWin:false,highlight:null,round:roundNum,controller:ctrl,flipped});
    }

    // ---- REAL PLAYER TURNS ----
    for(let p=0;p<3;p++){
      turn++;if(turn>800)break outer;
      const hand=hands[p];if(!hand.length)continue;

      // Dead card
      for(let ci=0;ci<hand.length;ci++){
        if(isDead(hand[ci])){disc.push(hand[ci]);const nc=draw();if(nc)hand[ci]=nc;else hand.splice(ci,1);
          states.push({...snap(),log:`Round ${roundNum} | ${PN[p]} discards dead card, draws replacement.`,
            player:p,card:null,pos:null,action:"dead",winner:null,yellowWin:false,highlight:null,round:roundNum,controller:ctrl,flipped:null});break}}

      if(!hand.length)continue;
      const move=bestMove(hand,p+1);
      if(move){
        const card=hand[move.ci];
        chips[move.pos[0]][move.pos[1]]=p+1;
        disc.push(card);const nc=draw();if(nc)hand[move.ci]=nc;else hand.splice(move.ci,1);
        const won=findLock(p+1);
        states.push({...snap(),log:`Round ${roundNum} | ${PN[p]} plays ${card} → [${move.pos[0]+1},${move.pos[1]+1}]`,
          player:p,card,pos:move.pos,action:"place",winner:won?p:null,yellowWin:false,highlight:move.pos,round:roundNum,controller:ctrl,flipped:null});
        if(won)break outer;
      }
    }
  }
  return{board,states}}

// ===== RENDERING =====
let game,step=0,autoPlay=false,speed=300,timer=null;

function cardLabel(card,small){
  if(!card||card==="FREE")return`<span style="font-size:${small?8:10}px;font-weight:700;color:#d97706;font-family:'Outfit'">★</span>`;
  const r=cRank(card),s=cSuit(card);
  return`<span class="card-lbl" style="font-size:${small?9:11}px;color:${SCLR[s]}">${r}<span style="font-size:${small?8:10}px">${SYM[s]}</span></span>`}

function render(){
  const st=game.states[step],board=game.board,isEnd=step>=game.states.length-1;

  // Round banner
  let rb=`<span style="font-size:11px;color:#94a3b8">Round <b style="color:#e2e8f0">${st.round||"--"}</b></span>`;
  if(st.controller>=0){
    rb+=`<span style="font-size:11px">`;
    rb+=`<span class="round-dot" style="background:${PC[3]}"></span> Yellow controlled by `;
    rb+=`<b style="color:${PC[st.controller]}">${PN[st.controller]}</b></span>`}
  if(st.flipped)rb+=`<span style="font-size:11px">Flipped: <span style="background:#fff;border:1px solid #d1d5db;border-radius:3px;padding:1px 4px">${cardLabel(st.flipped,true)}</span></span>`;
  document.getElementById("round-banner").innerHTML=rb;

  // Players (3 real + Yellow status)
  let ph="";
  for(let p=0;p<3;p++){
    const active=st.player===p,win=st.winner===p;
    ph+=`<div class="pbox${active?" active":""}" style="border-color:${active?PC[p]:"var(--border)"};background:${active?PC[p]+"15":"var(--surface)"}">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
        <div style="width:9px;height:9px;border-radius:50%;background:${PC[p]};box-shadow:${active?"0 0 8px "+PC[p]:"none"}"></div>
        <span style="font-weight:700;font-size:11px;color:${active?PC[p]:"#94a3b8"}">${PN[p]}${win?" 🏆":""}</span>
        <span style="font-size:9px;color:var(--muted)">(${(st.hands[p]||[]).length})</span>
      </div><div class="hand-cards">`;
    for(const card of(st.hands[p]||[])){
      const hl=st.card===card&&st.player===p;
      ph+=`<div class="hcard${hl?" hl":""}" style="${hl?"border-color:"+PC[p]:""}">${cardLabel(card,true)}</div>`}
    ph+=`</div></div>`}
  // Yellow mini-box
  const yActive=st.player===3;
  ph+=`<div class="pbox" style="border-color:${yActive?PC[3]:"var(--border)"};background:${yActive?PC[3]+"15":"var(--surface)"};min-width:90px;${yActive?"animation:yellowGlow 1.5s infinite":""}">
    <div style="display:flex;align-items:center;gap:4px">
      <div style="width:9px;height:9px;border-radius:50%;background:${PC[3]}"></div>
      <span style="font-weight:700;font-size:11px;color:${yActive?PC[3]:"#94a3b8"}">Yellow${st.yellowWin?" 💀":""}</span>
    </div>
    <div style="font-size:9px;color:var(--muted);margin-top:2px">Blind 4th</div></div>`;
  document.getElementById("players").innerHTML=ph;

  // Board
  let bh="";for(let r=0;r<10;r++)for(let c=0;c<10;c++){
    const cell=board[r][c],chip=st.chips[r][c],isHL=st.highlight&&st.highlight[0]===r&&st.highlight[1]===c,
      isFree=cell==="FREE",isLk=st.locked[r][c];
    const bg=isFree?"linear-gradient(135deg,#fef3c7,#fde68a)":"#ffffff";
    const bdr=isHL?"2.5px solid #facc15":isFree?"1.5px solid #d97706":chip>0&&chip<9?`1.5px solid ${PC[chip-1]}55`:chip===4?`1.5px solid ${PC[3]}55`:"1px solid #d1d5db";
    const anim=isHL?"pulseHL 1s infinite":"none";
    bh+=`<div class="cell" style="background:${bg};border:${bdr};animation:${anim}">`;
    bh+=cardLabel(cell,true);
    if(chip>0&&chip<9){const ci=chip-1;bh+=`<div class="chip" style="background:${PCB[ci]};border:2px solid ${PC[ci]};box-shadow:0 0 ${isLk?8:4}px ${PC[ci]}${isLk?"88":"44"};animation:${isHL?"chipPop .35s ease":"none"}"></div>`}
    if(chip===4)bh+=`<div class="chip" style="background:${PCB[3]};border:2px solid ${PC[3]};box-shadow:0 0 ${isLk?10:4}px ${PC[3]}${isLk?"88":"44"};animation:${isHL?"chipPop .35s ease":"none"}"></div>`;
    if(chip===9)bh+=`<div class="corner-chip"></div>`;
    if(isLk&&chip>0&&chip<9)bh+=`<div class="lock-icon" style="color:${PC[chip-1]}">🔒</div>`;
    if(isLk&&chip===4)bh+=`<div class="lock-icon" style="color:${PC[3]}">🔒</div>`;
    bh+=`</div>`}
  document.getElementById("board").innerHTML=bh;

  // Controls
  document.getElementById("btnBack").style.opacity=step===0?.4:1;
  document.getElementById("btnNext").style.opacity=isEnd?.4:1;
  const bp=document.getElementById("btnPlay");
  bp.textContent=autoPlay?"⏸ Pause":"▶ Play";
  bp.style.background=autoPlay?"#dc2626":"linear-gradient(135deg,#ca8a04,#eab308)";
  bp.style.color=autoPlay?"#fff":"#1a1a2e";

  // Info
  document.getElementById("turnInfo").textContent=`Turn ${step} / ${game.states.length-1}`;
  document.getElementById("deckInfo").textContent=`Deck: ${st.deckSize}`;

  // Log
  const logEl=document.getElementById("log");let lh="";
  for(let i=0;i<=step;i++){const s=game.states[i];
    const clr=s.yellowWin?"#eab308":s.winner!==null&&s.winner<3?PC[s.winner]+"dd":s.player===3?PC[3]+"99":s.player>=0?PC[s.player]+"bb":"var(--muted)";
    const fw=(s.winner!==null||s.yellowWin)?700:400;
    const prefix=s.yellowWin?"💀 ":s.winner!==null&&s.winner<3?"🏆 ":"";
    lh+=`<div class="log-line" style="color:${clr};font-weight:${fw}">${prefix}${s.log}</div>`}
  logEl.innerHTML=lh;logEl.scrollTop=logEl.scrollHeight;

  // Winner banner
  const wb=document.getElementById("winner-banner");
  if(st.yellowWin){
    wb.style.display="block";wb.style.background="#eab30822";wb.style.border="2px solid #eab308";wb.style.color="#eab308";
    wb.textContent=`💀 Yellow wins in ${step} turns! All players lose!`}
  else if(st.winner!==null&&st.winner<3){
    wb.style.display="block";wb.style.background=PC[st.winner]+"22";wb.style.border=`2px solid ${PC[st.winner]}`;wb.style.color=PC[st.winner];
    wb.textContent=`🏆 ${PN[st.winner]} wins in ${step} turns!`}
  else wb.style.display="none"}

function newGame(){stopAuto();const seed=Math.floor(Math.random()*2147483646)+1;game=generateGame(seed);step=0;render()}
function goStart(){stopAuto();step=0;render()}
function goBack(){if(step>0){step--;render()}}
function goNext(){if(step<game.states.length-1){step++;render()}}
function goEnd(){stopAuto();step=game.states.length-1;render()}
function stopAuto(){autoPlay=false;if(timer){clearInterval(timer);timer=null}}
function togglePlay(){if(autoPlay){stopAuto();render()}else if(step<game.states.length-1){autoPlay=true;render();timer=setInterval(()=>{if(step>=game.states.length-1){stopAuto();render();return}step++;render()},speed)}}
function onSpeedChange(v){speed=800-Number(v)+50;if(autoPlay){clearInterval(timer);timer=setInterval(()=>{if(step>=game.states.length-1){stopAuto();render();return}step++;render()},speed)}}

newGame();
</script>
</body>
</html>
