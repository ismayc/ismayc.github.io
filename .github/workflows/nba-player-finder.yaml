name: build-nba-player-finder

on:
  schedule:
    # Weekly, Mondays 13:00 UTC
    - cron: "0 13 * * 1"
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'nba-over-under-2025-2026/rosters/finder_app/app.R'
      - 'nba-over-under-2025-2026/rosters/build_roster_csv.py'
      - 'nba-over-under-2025-2026/rosters/build_finder_site.R'
      - '.github/workflows/nba-player-finder.yaml'

jobs:
  build-player-finder:
    runs-on: ubuntu-latest
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: nba-over-under-2025-2026/rosters
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install nba_api pandas

      - name: Pull current rosters
        run: python build_roster_csv.py

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install shinylive
        run: Rscript -e 'install.packages("shinylive")'

      - name: Cache shinylive webR assets
        uses: actions/cache@v4
        with:
          path: ~/.local/share/R/shinylive
          key: ${{ runner.os }}-shinylive-assets-v1

      - name: Export shinylive app
        run: Rscript build_finder_site.R

      - name: Push changes
        working-directory: ${{ github.workspace }}
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git fetch origin master
          git reset --soft origin/master
          git add nba-over-under-2025-2026/rosters/finder_app/players_finder.csv nba-player-finder
          git commit -m "GitHub Actions weekly roster refresh" || echo "No changes to commit"
          git push origin master
