name: build-nba-player-finder

on:
  schedule:
    # Weekly, Mondays 13:00 UTC
    - cron: "0 13 * * 1"
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'nba-over-under-2025-2026/rosters/finder_app/app.R'
      - 'nba-over-under-2025-2026/rosters/build_roster_csv.py'
      - 'nba-over-under-2025-2026/rosters/build_finder_site.R'
      - '.github/workflows/nba-player-finder.yaml'

jobs:
  build-player-finder:
    runs-on: ubuntu-latest
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # Don't let the rosters/ renv .Rprofile hijack installs into a
      # source-compiling project library; use default-lib RSPM binaries.
      RENV_CONFIG_AUTOLOADER_ENABLED: false
    defaults:
      run:
        working-directory: nba-over-under-2025-2026/rosters
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python packages
        run: pip install nba_api pandas requests

      - name: Pull current rosters
        run: python build_roster_csv.py

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install shinylive
        run: Rscript -e 'install.packages("shinylive")'

      - name: Cache shinylive webR assets
        uses: actions/cache@v4
        with:
          path: ~/.local/share/R/shinylive
          key: ${{ runner.os }}-shinylive-assets-v1

      - name: Export shinylive app
        run: Rscript build_finder_site.R

      # Gate the deploy on the test suite: the freshly pulled roster must satisfy
      # the data contract and the app must build against it (test-app-builds.R
      # sources app.R, reproducing the UI-construction path that blanked the page
      # when a player had an NA age). A failure here stops the job before the push
      # step, so a bad roster never deploys.
      - name: Test build before deploy
        run: Rscript run_tests.R

      - name: Verify export produced the expected files
        working-directory: ${{ github.workspace }}
        run: |
          for f in nba-player-finder/index.html nba-player-finder/app.json \
                   nba-player-finder/shinylive/shinylive.js; do
            if [ ! -s "$f" ]; then
              echo "ERROR: export is missing or empty: $f"; exit 1
            fi
          done
          python3 -c "import json,sys; json.load(open('nba-player-finder/app.json')); print('app.json is valid JSON')"

      - name: Push changes
        working-directory: ${{ github.workspace }}
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          # Retry against a moving master (other workflows also commit here).
          for attempt in 1 2 3 4 5; do
            git fetch origin master
            git reset --soft origin/master
            git add nba-over-under-2025-2026/rosters/finder_app/players_finder.csv nba-player-finder
            if git diff --cached --quiet; then
              echo "No changes to commit"; exit 0
            fi
            git commit -m "GitHub Actions weekly roster refresh"
            if git push origin master; then
              echo "Pushed on attempt $attempt"; exit 0
            fi
            echo "Push rejected (attempt $attempt); re-syncing and retrying..."
            sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push after retries"; exit 1
