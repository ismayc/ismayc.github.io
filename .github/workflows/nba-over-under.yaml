name: build-nba-webpage
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'nba-over-under-2025-2026/**'

jobs:
  check-date:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.date_check.outputs.should_run }}
    steps:
      - id: date_check
        run: |
          CURRENT_DATE=$(date -u +%Y-%m-%d)
          CUTOFF_DATE="2026-04-13"
          if [[ "$CURRENT_DATE" < "$CUTOFF_DATE" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
  build-nba-webpage:
    runs-on: ubuntu-latest
    needs: check-date
    if: ${{ needs.check-date.outputs.should_run == 'true' }}
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev python3-venv
          
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          
      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          extra-packages: |
            any::remotes
            any::rmarkdown
            any::quarto
            any::httr
            any::jsonlite
            any::tidyverse
            any::magrittr
            any::curl
            any::memoise
            any::furrr
            any::future
            any::glue
            any::stringi
            any::rvest
            any::DT
            any::htmltools
            any::plotly
            any::kableExtra
            any::sessioninfo
            any::reticulate
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Cache reticulate Python environment
        uses: actions/cache@v5
        with:
          path: /home/runner/.virtualenvs/r-reticulate
          key: ${{ runner.os }}-reticulate-py3.13-pandas-nba_api-v2
      
      - name: Install Python packages for reticulate
        run: |
          python -m venv --help > /dev/null 2>&1 || sudo apt-get install -y python3-venv
          Rscript -e "reticulate::virtualenv_create('r-reticulate', python = Sys.which('python'), force = TRUE)"
          Rscript -e "reticulate::virtualenv_install('r-reticulate', c('pandas', 'nba_api', 'bs4'))"
      
      - name: Build webpage
        run: |
          Rscript nba-over-under-2025-2026/make_plot_html.R
      
      - name: Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git fetch origin master
          git reset --soft origin/master
          git add -A
          git commit -m "GitHub Actions NBA page build" || echo "No changes to commit"
          git push origin master
          
      - name: Session info
        run: |
          Rscript -e "sessioninfo::session_info()"