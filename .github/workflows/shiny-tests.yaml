name: test-nba-player-finder

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'nba-over-under-2025-2026/rosters/finder_app/**'
      - 'nba-over-under-2025-2026/rosters/tests/**'
      - 'nba-over-under-2025-2026/rosters/run_tests.R'
      - '.github/workflows/shiny-tests.yaml'
  pull_request:
    paths:
      - 'nba-over-under-2025-2026/rosters/finder_app/**'
      - 'nba-over-under-2025-2026/rosters/tests/**'
      - 'nba-over-under-2025-2026/rosters/run_tests.R'

jobs:
  test-player-finder:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: nba-over-under-2025-2026/rosters
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # run_tests.R auto-installs testthat/shiny/DT/dplyr; with use-public-rspm
      # these come from Posit Package Manager as fast Linux binaries.
      - name: Run player-finder tests
        run: Rscript run_tests.R
