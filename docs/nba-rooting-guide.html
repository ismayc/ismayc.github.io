<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Over/Under Rooting Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0f19;--card:#111827;--card2:#1a2236;--border:#1e293b;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--over:#10b981;--under:#f43f5e;--over-bg:rgba(16,185,129,.1);--under-bg:rgba(244,63,94,.1);--over-border:rgba(16,185,129,.25);--under-border:rgba(244,63,94,.25);--accent:#3b82f6;--gold:#f59e0b;--purple:#a78bfa}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.shell{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
.date-line{font-size:12px;color:var(--t3);margin-bottom:24px;font-family:'JetBrains Mono',monospace}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--accent);border-color:var(--accent)}
.panel{display:none}.panel.active{display:block}

/* Player pills */
.player-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.player-row .label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
.pp{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t2);font-family:inherit;transition:.12s}
.pp:hover{border-color:var(--t3);color:var(--t1)}
.pp.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:10px}
.section-title{font-size:16px;font-weight:700;color:var(--t1);margin:20px 0 12px;display:flex;align-items:center;gap:8px}

/* Team rows */
.trow{display:grid;align-items:center;padding:7px 10px;border-radius:6px;font-size:13px;gap:8px}
.trow:nth-child(odd){background:rgba(255,255,255,.02)}
.trow:nth-child(even){background:transparent}
.team-name{font-weight:600;color:var(--t1);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.pill-sm{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px}
.pill-over{background:var(--over-bg);color:var(--over);border:1px solid var(--over-border)}
.pill-under{background:var(--under-bg);color:var(--under);border:1px solid var(--under-border)}
.pill-locked{background:rgba(148,163,184,.1);color:var(--t2);border:1px solid rgba(148,163,184,.2)}
.pill-close{background:rgba(245,158,11,.12);color:var(--gold);border:1px solid rgba(245,158,11,.3)}

/* Progress bars */
.prog-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex:1}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* Score summary */
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.score-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.15s}
.score-card:hover{border-color:var(--t3);transform:translateY(-1px)}
.score-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.score-name{font-size:14px;font-weight:700}
.score-num{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;margin:4px 0}
.score-sub{font-size:11px;color:var(--t3)}
.pos .score-num{color:var(--over)}.neg .score-num{color:var(--under)}

/* Tonight */
.game-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.game-matchup{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.game-at{color:var(--t3);font-weight:400;font-size:12px}
.impact-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.impact-bar{height:14px;border-radius:3px;min-width:2px}
.impact-name{width:60px;text-align:right;color:var(--t2);font-weight:500;font-size:11px}
.impact-val{width:40px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}

/* Field table */
.field-header{display:grid;align-items:center;padding:6px 10px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;gap:8px}

.tag-agree{color:var(--over);font-size:10px;font-weight:700}.tag-disagree{color:var(--under);font-size:10px;font-weight:700}
.chip{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:2px}
.chip-o{background:var(--over-bg);color:var(--over);border:1px solid var(--over-border)}
.chip-u{background:var(--under-bg);color:var(--under);border:1px solid var(--under-border)}
.faded{opacity:.4}
.bright{opacity:1}

/* Responsive */
@media(max-width:640px){
  .score-grid{grid-template-columns:1fr 1fr}
  .tabs{gap:0}.tab{padding:8px 10px;font-size:12px}
  h1{font-size:22px}
}
</style>
</head>

function getScore(p){
  let locked=0,pending=0,correct=0,wrong=0,undecided=[];
  for(const[t,td]of Object.entries(D.teams)){
    const[wage,choice]=D.picks[t][p];
    if(td.det==='OVER'){choice==='OVER'?(locked+=wage,correct++):(locked-=wage,wrong++)}
    else if(td.det==='UNDER'){choice==='UNDER'?(locked+=wage,correct++):(locked-=wage,wrong++)}
    else{
      const tracking=td.winPct>td.wp/82?'OVER':'UNDER';
      const pts=tracking===choice?wage:-wage;
      pending+=pts;
      undecided.push({team:t,wage,choice,tracking,pts,wtg:td.wtg,ltg:td.ltg,rem:td.rem,w:td.w,l:td.l,wp:td.wp,pWins:td.pWins});

  }
  return{locked,pending,total:locked+pending,correct,wrong,undecided};

  </div>`;

    const onTrack=t.pts>0;
    const pct=t.rem>0?(t.choice==='OVER'?(t.wtg!==null?Math.max(0,1-t.wtg/t.rem):1):(t.ltg!==null?Math.max(0,1-t.ltg/t.rem):1)):0;
    const barColor=onTrack?'var(--over)':'var(--under)';

      </div>
      <span class="mono" style="text-align:center;color:var(--t2)">${t.wtg!==null?t.wtg:'-'}</span>
      <span class="mono" style="text-align:center;color:var(--t2)">${t.ltg!==null?t.ltg:'-'}</span>
    </div>`;
  });

  el.innerHTML=h;
}

// ===== TAB 2: Tonight's Games =====
function renderTab2(el){
  let h=`<div class="section-title">Games on March 17, 2026</div>
  <p style="font-size:12px;color:var(--t3);margin-bottom:16px">Point impact if the <strong style="color:var(--t1)">home team wins</strong>. Negative means that player loses points.</p>`;

  // Only show games involving undecided teams
  D.todaysGames.forEach(([away,home])=>{
    const homeT=D.teams[home], awayT=D.teams[away];
    // For each game, show what happens for each player if home wins vs away wins
    const homeUndecided=homeT.det==='not yet', awayUndecided=awayT.det==='not yet';
    if(!homeUndecided&&!awayUndecided) return; // skip fully decided games

    h+=`<div class="game-card">
      <div class="game-matchup">${sn(away)} <span class="game-at">@</span> ${sn(home)}</div>`;

    // Calculate impact per player
    const impacts=P.map(p=>{
      let homeWinDelta=0;
      // If home team wins, what changes?
      if(homeUndecided){
        const[hw,hc]=D.picks[home][p];
        const curTrack=teamTracking(home);
        // A home win pushes toward OVER
        // Only matters if it could change tracking or clinch
        if(hc==='OVER') homeWinDelta+=Math.round(hw*0.15); // approximate impact
        else homeWinDelta-=Math.round(hw*0.15);
        // Check if near clinch
        if(homeT.wtg===1&&hc==='OVER') homeWinDelta=hw*2; // clinches OVER!
        else if(homeT.wtg===1&&hc!=='OVER') homeWinDelta=-hw*2;
        else if(hc==='OVER') homeWinDelta=1;
        else homeWinDelta=-1;
      }
      if(awayUndecided){
        const[aw,ac]=D.picks[away][p];
        // Away team losing pushes toward UNDER
        if(awayT.ltg===1&&ac==='UNDER') homeWinDelta+=aw*2;
        else if(awayT.ltg===1&&ac!=='UNDER') homeWinDelta-=aw*2;
        else if(ac==='UNDER') homeWinDelta+=1;
        else homeWinDelta-=1;
      }
      return{player:p,delta:homeWinDelta};
    }).sort((a,b)=>b.delta-a.delta);

    // Better approach: just show each player's stake in each undecided team in this game
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">`;

    // Home team stakes
    if(homeUndecided){
      h+=`<div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">${sn(home)} (${homeT.w}-${homeT.l}) &middot; Target: ${homeT.wp} &middot; Wins to go: ${homeT.wtg!==null?homeT.wtg:'-'}${homeT.wtg===1?' <span style="color:var(--gold)">CLINCH WATCH</span>':''}</div>`;
      P.forEach(p=>{
        const[w,c]=D.picks[home][p];
        const col=c==='OVER'?'var(--over)':'var(--under)';
        h+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px">
          <span style="width:55px;color:var(--t2)">${p}</span>
          <span class="pill-sm pill-${c.toLowerCase()}">${w}${c[0]}</span>
          <span style="color:var(--t3);font-size:11px">${c==='OVER'?'wants wins':'wants losses'}</span>
        </div>`;
      });
      h+=`</div>`;
    }

    if(awayUndecided){
      h+=`<div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">${sn(away)} (${awayT.w}-${awayT.l}) &middot; Target: ${awayT.wp} &middot; Losses to clinch under: ${awayT.ltg!==null?awayT.ltg:'-'}${awayT.ltg===1?' <span style="color:var(--gold)">CLINCH WATCH</span>':''}</div>`;
      P.forEach(p=>{
        const[w,c]=D.picks[away][p];
        const col=c==='OVER'?'var(--over)':'var(--under)';
        h+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px">
          <span style="width:55px;color:var(--t2)">${p}</span>
          <span class="pill-sm pill-${c.toLowerCase()}">${w}${c[0]}</span>
          <span style="color:var(--t3);font-size:11px">${c==='OVER'?'wants wins':'wants losses'}</span>
        </div>`;
      });
      h+=`</div>`;
    }

    h+=`</div></div>`;
  });

  el.innerHTML=h;
}

// ===== TAB 3: Pace & Difficulty =====
function renderTab3(el){
  let h=`<div class="section-title">Undecided Teams - Projected Pace vs Target</div>
  <p style="font-size:12px;color:var(--t3);margin-bottom:16px">Teams sorted by how far their current pace projects from their win target. Closer to clinching = higher urgency.</p>`;

  const undecided=Object.entries(D.teams).filter(([,t])=>t.det==='not yet').map(([name,t])=>{
    const gap=t.pWins-t.wp;
    const winPctNeeded=t.wtg!==null?Math.round(t.wtg/t.rem*100):null;
    return{name,gap,...t,winPctNeeded};
  }).sort((a,b)=>Math.abs(a.gap)-Math.abs(b.gap));

  h+=`<div style="display:grid;grid-template-columns:140px 55px 50px 50px 80px 1fr 70px;gap:8px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">
    <span>Team</span><span>Record</span><span>Target</span><span>Pace</span><span>Gap</span><span>Trajectory</span><span>Win% Needed</span>
  </div>`;

  undecided.forEach(t=>{
    const gap=t.gap;
    const gapCol=gap>0?'var(--over)':'var(--under)';
    const tracking=gap>0?'OVER':'UNDER';
    const barPct=Math.min(Math.abs(gap)/20*100,100);

    // Difficulty: win% needed to go over
    const wpn=t.winPctNeeded;
    let diffLabel='',diffCol='var(--t2)';
    if(wpn!==null){
      if(wpn>100){diffLabel='Impossible';diffCol='var(--under)'}
      else if(wpn>80){diffLabel=wpn+'%';diffCol='var(--under)'}
      else if(wpn>60){diffLabel=wpn+'%';diffCol='var(--gold)'}
      else{diffLabel=wpn+'%';diffCol='var(--over)'}
    }else{diffLabel='Clinched'}

    h+=`<div class="trow" style="grid-template-columns:140px 55px 50px 50px 80px 1fr 70px">
      <span class="team-name">${sn(t.name)}</span>
      <span class="mono">${t.w}-${t.l}</span>
      <span class="mono" style="color:var(--t3)">${t.wp}</span>
      <span class="mono" style="color:${gapCol}">${t.pWins}</span>
      <span class="mono" style="color:${gapCol}">${gap>0?'+':''}${gap.toFixed(1)}</span>
      <div style="display:flex;align-items:center;gap:4px">
        <div style="display:flex;width:100%;height:14px;border-radius:3px;overflow:hidden;background:var(--border)">
          <div style="width:50%;display:flex;justify-content:flex-end">
            ${gap<0?`<div style="width:${barPct}%;background:var(--under);border-radius:3px 0 0 3px;min-width:${Math.abs(gap)>0?2:0}px"></div>`:''}
          </div>
          <div style="width:1px;background:var(--t3)"></div>
          <div style="width:50%">
            ${gap>0?`<div style="width:${barPct}%;background:var(--over);border-radius:0 3px 3px 0;min-width:${gap>0?2:0}px"></div>`:''}
          </div>
        </div>
      </div>
      <span class="mono" style="text-align:center;color:${diffCol};font-size:11px">${diffLabel}</span>
    </div>`;
  });

  // Summary of close calls
  const close=undecided.filter(t=>Math.abs(t.gap)<5);
  if(close.length){
    h+=`<div class="section-title" style="margin-top:24px">Razor-thin margins (pace within 5 wins of target)</div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;
    close.forEach(t=>{
      const g=t.gap;
      h+=`<span class="chip chip-${g>0?'o':'u'}">${sn(t.name)}: ${g>0?'+':''}${g.toFixed(1)} ${g>0?'over':'under'} pace</span>`;
    });
    h+=`</div>`;
  }

  el.innerHTML=h;
}

// ===== TAB 4: Player vs Field =====
function renderTab4(el,player){
  const others=P.filter(p=>p!==player);
  const undecidedTeams=Object.entries(D.teams).filter(([,t])=>t.det==='not yet').map(([name])=>name);

  // For each undecided team, compare player's pick to the group
  const rows=undecidedTeams.map(team=>{
    const[wage,choice]=D.picks[team][player];
    const othersData=others.map(p=>{const[w,c]=D.picks[team][p];return{player:p,wage:w,choice:c}});
    const sameDir=othersData.filter(o=>o.choice===choice).length;
    const oppositeDir=othersData.filter(o=>o.choice!==choice).length;
    const avgOppWage=oppositeDir>0?Math.round(othersData.filter(o=>o.choice!==choice).reduce((s,o)=>s+o.wage,0)/oppositeDir):0;
    const uniqueness=oppositeDir/others.length;
    const td=D.teams[team];
    return{team,wage,choice,sameDir,oppositeDir,avgOppWage,uniqueness,tracking:teamTracking(team),w:td.w,l:td.l,wp:td.wp,othersData};
  }).sort((a,b)=>b.uniqueness-a.uniqueness||b.wage-a.wage);

  const sc=getScore(player);

  let h=`<div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px">
      <div style="font-size:11px;color:var(--t3)">Unique Picks</div>
      <div style="font-size:24px;font-weight:800;font-family:'JetBrains Mono';color:var(--purple)">${rows.filter(r=>r.oppositeDir>=5).length}</div>
      <div style="font-size:11px;color:var(--t3)">where 5+ others disagree</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px">
      <div style="font-size:11px;color:var(--t3)">Biggest Outlier</div>
      <div style="font-size:16px;font-weight:700;color:var(--t1)">${rows.length?sn(rows[0].team):'-'}</div>
      <div style="font-size:11px;color:var(--t3)">${rows.length?rows[0].oppositeDir+'/7 others disagree':''}</div>
    </div>
  </div>`;

  h+=`<div class="section-title">Undecided teams where ${player} diverges from the group</div>`;
  h+=`<div style="display:grid;grid-template-columns:120px 55px 50px 55px 60px 1fr;gap:8px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">
    <span>Team</span><span>${player}</span><span>Record</span><span>Tracking</span><span>Agree</span><span>Others' Picks</span>
  </div>`;

  rows.forEach(r=>{
    const onTrack=r.tracking===r.choice;
    h+=`<div class="trow" style="grid-template-columns:120px 55px 50px 55px 60px 1fr">
      <span class="team-name">${sn(r.team)}</span>
      <span><span class="pill-sm pill-${r.choice.toLowerCase()}">${r.wage}${r.choice[0]}</span></span>
      <span class="mono">${r.w}-${r.l}</span>
      <span class="pill-sm pill-${r.tracking.toLowerCase()}" style="font-size:9px">${r.tracking}</span>
      <span style="font-size:12px;color:${r.sameDir>=4?'var(--over)':r.sameDir<=2?'var(--under)':'var(--gold)'}">${r.sameDir}/7</span>
      <div style="display:flex;flex-wrap:wrap;gap:3px">`;

    r.othersData.forEach(o=>{
      const agree=o.choice===r.choice;
      h+=`<span style="font-size:10px;padding:1px 5px;border-radius:6px;background:${agree?'rgba(16,185,129,.08)':'rgba(244,63,94,.08)'};color:${agree?'var(--over)':'var(--under)'}">${o.player[0]}${o.wage}${o.choice[0]}</span>`;
    });
    h+=`</div></div>`;
  });

  el.innerHTML=h;
}

// ===== Setup tabs =====
const tabDefs=[
  {id:'rooting',label:'Rooting Guide',needsPlayer:true,render:renderTab1},
  {id:'tonight',label:"Tonight's Games",needsPlayer:false,render:renderTab2},
  {id:'pace',label:'Pace & Projections',needsPlayer:false,render:renderTab3},
  {id:'field',label:'Player vs Field',needsPlayer:true,render:renderTab4},
];
let activeTab='rooting', activePlayer='Chester';

function renderAll(){
  // Tabs
  document.getElementById('tabs').innerHTML=tabDefs.map(t=>
    `<div class="tab ${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`
  ).join('');

  // Panel
  const panel=document.getElementById('panels');
  const def=tabDefs.find(t=>t.id===activeTab);

  let h='';
  if(def.needsPlayer){
    h+=`<div class="player-row"><span class="label">Player</span>`;
    P.forEach(p=>{
      const sc=getScore(p);
      h+=`<button class="pp ${p===activePlayer?'active':''}" onclick="switchPlayer('${p}')">${p} <span style="opacity:.6;font-family:'JetBrains Mono';font-size:10px">(${sc.total>=0?'+':''}${sc.total})</span></button>`;
    });
    h+=`</div>`;
  }
  h+=`<div id="tab-content"></div>`;
  panel.innerHTML=h;

  const content=document.getElementById('tab-content');
  if(def.needsPlayer) def.render(content,activePlayer);
  else def.render(content);
}

function switchTab(id){activeTab=id;renderAll()}
function switchPlayer(p){activePlayer=p;renderAll()}
renderAll();
</script>
